<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0B1220">
    <link rel="manifest" href="data:application/manifest+json,{
      &quot;name&quot;: &quot;Gym Reaper OS Elite&quot;,
      &quot;short_name&quot;: &quot;ReaperOS&quot;,
      &quot;start_url&quot;: &quot;.&quot;,
      &quot;display&quot;: &quot;standalone&quot;,
      &quot;background_color&quot;: &quot;#0B1220&quot;,
      &quot;theme_color&quot;: &quot;#0B1220&quot;,
      &quot;icons&quot;: [{
        &quot;src&quot;: &quot;data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💀</text></svg>&quot;,
        &quot;sizes&quot;: &quot;any&quot;,
        &quot;type&quot;: &quot;image/svg+xml&quot;
      }]
    }">
    <title>GYM REAPER OS ELITE</title>
    <style>
        :root {
            --bg: #0B1220; --card: #121C2F; --card-hover: #1a2744; --text: #FFFFFF;
            --text-secondary: #94a3b8; --text-muted: #64748b; --rank: #A855F7;
            --streak: #F97316; --goal: #22C55E; --workout: #3B82F6;
            --achievement: #FACC15; --analytics: #06B6D4; --danger: #EF4444;
            --radius: 16px; --gap: 12px; --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --font: 'Inter', system-ui, -apple-system, sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: var(--font);
            min-height: 100dvh; overflow-y: auto; display: flex; justify-content: center; align-items: flex-start;
            padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(12px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
            -webkit-font-smoothing: antialiased; -webkit-tap-highlight-color: transparent;
        }
        .dashboard { display: grid; grid-template-columns: 1fr 1.8fr 1fr; grid-template-rows: auto auto auto 1fr; gap: var(--gap); max-width: 1400px; width: 100%; height: auto; min-height: 100%; background: transparent; }
        .card {
            background: var(--card); border: 1px solid rgba(255,255,255,0.05); border-radius: var(--radius);
            padding: 16px; display: flex; flex-direction: column; gap: 10px;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); transition: var(--transition);
            position: relative; overflow: hidden; box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px; opacity: 0.9; }
        .rank-accent::after { background: var(--rank); } .streak-accent::after { background: var(--streak); }
        .goal-accent::after { background: var(--goal); } .workout-accent::after { background: var(--workout); }
        .achievement-accent::after { background: var(--achievement); } .analytics-accent::after { background: var(--analytics); }
        .card-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); font-weight: 600; order: 3; }
        .kpi { font-size: 2.2rem; font-weight: 800; line-height: 1; order: 1; }
        .progress-wrap { order: 2; display: flex; flex-direction: column; gap: 4px; }
        .progress-bar { height: 6px; border-radius: 10px; background: rgba(255,255,255,0.08); overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
        .progress-text { font-size: 0.7rem; color: var(--text-secondary); font-weight: 500; font-variant-numeric: tabular-nums; }
        .secondary { font-size: 0.8rem; color: var(--text-secondary); order: 4; }
        .card-rank { grid-column:1; grid-row:1; } .card-streak { grid-column:1; grid-row:2; } .card-goal { grid-column:1; grid-row:3; }
        .card-workout-hero { grid-column:2; grid-row:1/4; padding: 20px; display: flex; flex-direction: column; gap: 12px; overflow-y: visible; }
        .card-achievement { grid-column:3; grid-row:1; } .card-analytics { grid-column:3; grid-row:2/4; gap:12px; }
        .card-weekly { grid-column:1/4; grid-row:4; display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 14px; overflow: hidden; }
        .hero-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        .badge { padding: 6px 14px; border-radius: 20px; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: #fff; }
        .badge-workout { background: var(--workout); } .badge-rest { background: #334155; }
        .status { font-size: 0.7rem; padding: 6px 12px; border-radius: 20px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
        .status-pending { background: rgba(245,158,11,0.1); color: #f59e0b; border: 1px solid #f59e0b33; }
        .status-done { background: rgba(34,197,94,0.1); color: #22C55E; border: 1px solid #22C55E33; }
        .status-rest { background: rgba(148,163,184,0.1); color: #94a3b8; border: 1px solid #94a3b833; }
        .hero-title { font-size: 1.7rem; font-weight: 900; letter-spacing: -0.02em; line-height: 1.2; }
        .hero-details { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 12px; font-size: 0.75rem; color: var(--text-secondary); }
        .collapsible-section { border-top: 1px solid rgba(255,255,255,0.05); margin-top: 8px; padding-top: 8px; }
        .collapsible-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; -webkit-user-select: none; }
        .hero-exercises { display: flex; flex-direction: column; gap: 6px; font-size: 0.75rem; color: #cbd5e1; margin-top: 4px; }
        .ex-row { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: rgba(255,255,255,0.03); border-radius: 10px; }
        .ex-row input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--workout); cursor: pointer; }
        .custom-exercise { border-left: 3px solid var(--achievement); background: rgba(250,204,21,0.08); }
        .custom-badge { font-size: 0.6rem; background: var(--achievement); color: #000; padding: 2px 6px; border-radius: 10px; margin-left: 6px; font-weight: 700; }
        .edit-btn, .delete-btn { background: none; border: none; cursor: pointer; font-size: 1rem; padding: 10px 12px; line-height: 1; min-width: 44px; min-height: 44px; touch-action: manipulation; }
        .edit-btn { color: var(--text-muted); } .delete-btn { color: var(--danger); }
        .progress-ring { display: flex; align-items: center; gap: 12px; margin-top: 6px; }
        .ring { width: 50px; height: 50px; border-radius: 50%; background: conic-gradient(var(--workout) 0deg, #1e293b 0deg); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.8rem; }
        .muscle-tags { display: flex; flex-wrap: wrap; gap: 6px; }
        .muscle-tag { background: rgba(255,255,255,0.05); color: #cbd5e1; padding: 4px 10px; border-radius: 12px; font-size: 0.65rem; font-weight: 500; }
        .yesterday-tomorrow { display: flex; justify-content: space-between; font-size: 0.65rem; color: var(--text-muted); }
        .btn { background: var(--workout); color: #fff; border: none; padding: 12px; border-radius: 12px; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: var(--transition); text-transform: uppercase; letter-spacing: 0.05em; box-shadow: 0 4px 12px rgba(59,130,246,0.3); width: 100%; text-align: center; }
        .btn:active { transform: scale(0.97); }
        .badge-icon { font-size: 2rem; }
        .analytics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .mini-stat canvas { width: 100%; height: 36px; border-radius: 8px; }
        .weekly-day { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 2px; border-radius: 12px; background: rgba(255,255,255,0.02); min-width: 70px; }
        .weekly-day.today { background: rgba(59,130,246,0.1); border: 1px solid var(--workout); }
        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot-done { background: #22C55E; } .dot-planned { background: var(--workout); }
        .dot-missed { background: var(--danger); } .dot-rest { background: #334155; }
        .modal-overlay { position: fixed; top:0; left:0; right:0; bottom:0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; visibility: hidden; opacity:0; transition: 0.2s ease; }
        .modal-overlay.active { visibility: visible; opacity:1; }
        .modal-content { width: 100%; max-width: 500px; background: #1a2744; border-radius: 20px 20px 0 0; padding: 20px 20px 30px; box-shadow: 0 -4px 20px rgba(0,0,0,0.5); transform: translateY(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); max-height: 80vh; overflow-y: auto; }
        .modal-overlay.active .modal-content { transform: translateY(0); }
        .modal-content input { width: 100%; padding: 12px; margin-bottom: 12px; border-radius: 12px; background: #121C2F; color: #fff; border: 1px solid #334155; font-size: 0.9rem; }
        .modal-actions { display: flex; gap: 10px; margin-top: 10px; }
        .modal-actions .btn { flex:1; padding:14px; font-size:0.9rem; }
        .report-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 2000; visibility: hidden; opacity:0; transition: 0.3s ease; }
        .report-overlay.active { visibility: visible; opacity:1; }
        .report-container { width: 95%; max-width: 900px; max-height: 90vh; background: #0f172a; border-radius: 20px; padding: 20px; overflow-y: auto; border: 1px solid #1e293b; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .report-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .report-tabs { display: flex; gap: 6px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 6px; }
        .report-tab { padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.05); color: var(--text-secondary); font-size: 0.75rem; font-weight: 600; cursor: pointer; white-space: nowrap; border: 1px solid transparent; }
        .report-tab.active { background: var(--workout); color: #fff; border-color: var(--workout); }
        .report-content { color: var(--text-secondary); font-size: 0.8rem; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: var(--text-muted); font-weight: 600; font-size: 0.7rem; text-transform: uppercase; }
        .heatmap-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-top: 10px; }
        .heatmap-cell { aspect-ratio: 1; border-radius: 6px; background: #1e293b; }
        .heatmap-cell.done { background: #22C55E; } .heatmap-cell.missed { background: var(--danger); } .heatmap-cell.rest { background: #334155; }
        @media (max-width: 900px) {
            .dashboard { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
            .card-workout-hero { grid-column:1/3; grid-row:auto; }
            .card-rank,.card-streak,.card-goal,.card-achievement,.card-analytics { grid-column:span 1; grid-row:auto; }
            .card-weekly { grid-column:1/3; grid-row:auto; }
            .kpi { font-size: 1.6rem; } .hero-title { font-size: 1.4rem; }
        }
        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; gap: 10px; }
            .card,.card-rank,.card-streak,.card-goal,.card-workout-hero,.card-achievement,.card-analytics,.card-weekly { grid-column: auto !important; grid-row: auto !important; display: flex; }
            .card-weekly { display: flex; overflow-x: auto; gap: 8px; padding: 12px 4px; -webkit-overflow-scrolling: touch; scroll-snap-type: x mandatory; }
            .weekly-day { flex: 0 0 auto; width: 85px; scroll-snap-align: start; }
            .weekly-header { display: none; }
            .hero-exercises { max-height: none; overflow-y: visible; }
            .btn { padding: 14px; }
        }
        @media (max-width: 400px) { .hero-title { font-size: 1.2rem; } .kpi { font-size: 1.4rem; } }
    </style>
</head>
<body>
<div class="dashboard" id="dashboard"></div>
<div class="modal-overlay" id="customModal"><div class="modal-content"><h3 style="margin-bottom:12px;">Custom Exercise</h3><input type="text" id="modalName" placeholder="Exercise name"><div style="display:flex; gap:12px;"><label style="flex:1; color:var(--text-secondary);">Sets <input type="number" id="modalSets" value="3" min="1"></label><label style="flex:1; color:var(--text-secondary);">Reps <input type="text" id="modalReps" value="10"></label></div><div class="modal-actions"><button class="btn" id="modalSaveBtn" style="background:var(--workout);">Save</button><button class="btn" id="modalCancelBtn" style="background:#334155;">Cancel</button></div><div id="modalDeleteBtn" style="text-align:center; margin-top:8px; color:var(--danger); font-size:0.8rem; display:none;">Delete</div></div></div>
<div class="modal-overlay" id="bodyFatModal"><div class="modal-content"><h3 style="margin-bottom:12px;">Log Body Fat</h3><label style="color:var(--text-secondary);">Body Fat % <input type="number" id="bfInput" step="0.1" min="1" max="50" placeholder="e.g. 13.2"></label><label style="color:var(--text-secondary);">Weight (kg) <input type="number" id="weightInput" step="0.1" min="30" max="300" placeholder="e.g. 78.5"></label><div class="modal-actions"><button class="btn" id="bfSaveBtn" style="background:var(--goal);">Save Log</button><button class="btn" id="bfCancelBtn" style="background:#334155;">Cancel</button></div></div></div>
<div class="report-overlay" id="reportOverlay"><div class="report-container"><div class="report-header"><h2>📊 Detailed Analytics</h2><button id="closeReportBtn" style="background:none; border:none; font-size:1.5rem; color:#fff; cursor:pointer;">✕</button></div><div class="report-tabs" id="reportTabs"><div class="report-tab active" data-tab="monthly">Monthly</div><div class="report-tab" data-tab="exercises">Exercises</div><div class="report-tab" data-tab="trends">Trends</div><div class="report-tab" data-tab="calendar">Calendar</div><div class="report-tab" data-tab="missed">Missed</div><div class="report-tab" data-tab="comparison">Comparison</div></div><div class="report-content" id="reportContent"></div></div></div>

<script>
if ('serviceWorker' in navigator) { window.addEventListener('load', () => { const swCode = `const CACHE_NAME='gym-reaper-v4';self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE_NAME).then(c=>c.addAll(['./'])))});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)))});`; const blob = new Blob([swCode], {type:'application/javascript'}); navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{}); }); }

(function() {
    // ══════════════════════════════════════════════
    // GYM REAPER OS ELITE — EXCEL BLUEPRINT COMPLETE
    // ══════════════════════════════════════════════
    const today = new Date(); const todayStr = today.toISOString().slice(0,10);
    const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const todayName = dayNames[today.getDay()];
    const workoutPlan = {
        Monday: { muscle:'Chest + Triceps', exercises: ['Bench Press','Incline Dumbbell Press','Cable Flyes','Tricep Pushdown','Skull Crushers','Dips'] },
        Tuesday: { muscle:'Back + Biceps', exercises: ['Deadlift','Barbell Row','Lat Pulldown','Face Pulls','Barbell Curls','Hammer Curls'] },
        Wednesday: { muscle:'Shoulders', exercises: ['Overhead Press','Lateral Raises','Front Raises','Rear Delt Fly','Arnold Press','Shrugs'] },
        Thursday: { muscle:'Chest + Triceps', exercises: ['Bench Press','Incline Dumbbell Press','Cable Flyes','Tricep Pushdown','Skull Crushers','Dips'] },
        Friday: { muscle:'Back + Biceps', exercises: ['Deadlift','Barbell Row','Lat Pulldown','Face Pulls','Barbell Curls','Hammer Curls'] },
        Saturday: { muscle:'Legs', exercises: ['Squat','Romanian Deadlift','Leg Press','Leg Curl','Calf Raises','Lunges'] },
        Sunday: { muscle:'Rest', exercises: [] }
    };
    const workoutTemplates = {
        'Chest + Triceps': ['Bench Press','Incline Dumbbell Press','Cable Flyes','Tricep Pushdown','Skull Crushers','Dips'],
        'Back + Biceps': ['Deadlift','Barbell Row','Lat Pulldown','Face Pulls','Barbell Curls','Hammer Curls'],
        'Shoulders': ['Overhead Press','Lateral Raises','Front Raises','Rear Delt Fly','Arnold Press','Shrugs'],
        'Legs': ['Squat','Romanian Deadlift','Leg Press','Leg Curl','Calf Raises','Lunges']
    };

    let log = []; try { log = JSON.parse(localStorage.getItem('gymReaperLog') || '[]'); } catch(e) {}
    const saveLog = () => { try { localStorage.setItem('gymReaperLog', JSON.stringify(log)); } catch(e) {} };
    let bfLog = []; try { bfLog = JSON.parse(localStorage.getItem('gymReaperBFLog') || '[]'); } catch(e) {}
    const saveBFLog = () => { try { localStorage.setItem('gymReaperBFLog', JSON.stringify(bfLog)); } catch(e) {} };
    let overrideWorkout = localStorage.getItem('gymReaperOverride') || null;
    const saveOverride = (v) => { overrideWorkout = v; try { v ? localStorage.setItem('gymReaperOverride', v) : localStorage.removeItem('gymReaperOverride'); } catch(e) {} };

    function getTodayEntry() { return log.find(e => e.date === todayStr) || null; }
    function getCustomExercises() { const e = getTodayEntry(); return e?.customExercises || []; }
    function getTodayExercisesDone() { const e = getTodayEntry(); return e?.exercisesCompleted || []; }
    function isTodayCompleted() { const e = getTodayEntry(); return e?.complete || false; }
    function getTodayWorkoutType() {
        if (overrideWorkout && workoutTemplates[overrideWorkout]) return overrideWorkout;
        return workoutPlan[todayName].muscle;
    }
    function getTodayExercises() {
        const type = getTodayWorkoutType();
        return workoutTemplates[type] || workoutPlan[todayName].exercises;
    }

    const totalWorkouts = log.filter(e => e.complete).length;
    const totalExercisesAll = log.reduce((s, e) => s + (e.exercisesCompleted?.length || 0), 0);
    const currentStreak = (() => { let s = isTodayCompleted() ? 1 : 0; let d = new Date(today); if (!isTodayCompleted()) d.setDate(d.getDate()-1); while (true) { d.setDate(d.getDate()-1); if (log.find(e => e.date===d.toISOString().slice(0,10) && e.complete)) s++; else break; } return s; })();
    const longestStreak = (() => { const dates = log.filter(e=>e.complete).map(e=>e.date).sort(); let max=0,cur=0,prev=null; for(let d of dates){ const nd=new Date(d); if(prev){ if((nd-prev)/864e5===1)cur++; else{max=Math.max(max,cur);cur=1;} }else cur=1; prev=nd; } return Math.max(max,cur,0); })();
    const weeklyWorkouts = (() => { const start = new Date(today); start.setDate(today.getDate() - today.getDay()); const end = today; return log.filter(e => e.complete && new Date(e.date)>=start && new Date(e.date)<=end).length; })();
    const monthlyWorkouts = (() => { const start = new Date(today.getFullYear(), today.getMonth(), 1); return log.filter(e => e.complete && new Date(e.date)>=start && new Date(e.date)<=today).length; })();
    const adherence = (() => { const start = new Date(today.getFullYear(), today.getMonth(), 1); let expected=0, done=0; for(let d=new Date(start); d<=today; d.setDate(d.getDate()+1)){ if(d.getDay()!==0) expected++; if(log.find(e=>e.date===d.toISOString().slice(0,10) && e.complete)) done++; } return expected ? Math.round(done/expected*100) : 0; })();

    // XP calculation
    let xp = totalWorkouts * 25;
    if (weeklyWorkouts >= 5) xp += 50;
    if (monthlyWorkouts >= 20) xp += 100;
    if (currentStreak >= 7) xp += 35;
    if (currentStreak >= 30) xp += 150;

    // Rank system (10 tiers)
    const rankTiers = [
        { name:'Novice', min:0, icon:'🌱', color:'#9CA3AF' }, { name:'Beginner', min:100, icon:'💪', color:'#22C55E' },
        { name:'Warrior I', min:300, icon:'⚔️', color:'#3B82F6' }, { name:'Warrior II', min:600, icon:'🗡️', color:'#8B5CF6' },
        { name:'Warrior III', min:1000, icon:'⚡', color:'#A855F7' }, { name:'Elite I', min:1500, icon:'🔥', color:'#F97316' },
        { name:'Elite II', min:2500, icon:'💥', color:'#EF4444' }, { name:'Champion', min:4000, icon:'🏆', color:'#FACC15' },
        { name:'Legend', min:6000, icon:'👑', color:'#FFD700' }, { name:'Reaper', min:10000, icon:'💀', color:'#DC2626' }
    ];
    let currentRank = rankTiers[0];
    for (let r of rankTiers) if (xp >= r.min) currentRank = r;
    const nextRank = rankTiers[rankTiers.indexOf(currentRank)+1] || null;

    // Achievement engine (12 badges)
    const achievements = [
        { id:'A001', name:'First Blood', icon:'🥉', tier:'Bronze', req:1, weight:1, xp:20 },
        { id:'A002', name:'Getting Started', icon:'🥉', tier:'Bronze', req:5, weight:1, xp:25 },
        { id:'A003', name:'Week Warrior', icon:'🥈', tier:'Silver', req:7, weight:2, xp:35 },
        { id:'A004', name:'Committed', icon:'🥈', tier:'Silver', req:25, weight:2, xp:50 },
        { id:'A005', name:'Iron Will', icon:'🥇', tier:'Gold', req:30, weight:3, xp:150 },
        { id:'A006', name:'Century Club', icon:'🥇', tier:'Gold', req:100, weight:3, xp:200 },
        { id:'A007', name:'Unstoppable', icon:'💎', tier:'Elite', req:60, weight:4, xp:300 },
        { id:'A008', name:'Legend', icon:'💎', tier:'Elite', req:365, weight:5, xp:500 },
        { id:'A009', name:'Early Bird', icon:'🥉', tier:'Bronze', req:5, weight:1, xp:30 },
        { id:'A010', name:'Night Owl', icon:'🥉', tier:'Bronze', req:5, weight:1, xp:30 },
        { id:'A011', name:'Volume King', icon:'🥈', tier:'Silver', req:1000, weight:2, xp:75 },
        { id:'A012', name:'Consistency Master', icon:'🥇', tier:'Gold', req:4, weight:3, xp:100 }
    ].map(a => {
        let val = 0;
        if (a.id.includes('streak')||a.id==='A003') val = currentStreak;
        else if (a.id==='A004'||a.id==='A006'||a.id==='A008') val = totalWorkouts;
        else if (a.id==='A005'||a.id==='A007') val = currentStreak;
        else if (a.id==='A012') val = weeklyWorkouts >= 5 ? 4 : 0;
        else if (a.id==='A011') val = totalExercisesAll;
        else if (a.id==='A001') val = totalWorkouts >= 1 ? 1 : 0;
        else if (a.id==='A002') val = totalWorkouts >= 5 ? 5 : 0;
        return { ...a, earned: val >= a.req, progress: Math.min(val, a.req) };
    });
    const latestAch = achievements.filter(a=>a.earned).sort((a,b)=>b.weight-a.weight)[0] || null;
    const nextAch = achievements.find(a=>!a.earned) || achievements[achievements.length-1];

    const customExercises = getCustomExercises();
    const todayCompleted = isTodayCompleted();
    const todayExercisesDone = getTodayExercisesDone();
    const todayType = getTodayWorkoutType();
    const todayExercises = getTodayExercises();
    const totalEx = todayExercises.length + customExercises.length;

    const targetBF = 8.0;
    const startBF = bfLog.length > 0 ? bfLog[0].bodyFat : 13.2;
    const latestBF = bfLog.length > 0 ? bfLog[bfLog.length-1].bodyFat : startBF;
    const goalProgress = Math.min(100, Math.max(0, Math.round((startBF - latestBF) / (startBF - targetBF) * 100)));

    // ── Render ─────────────────────────────
    const root = document.getElementById('dashboard');
    root.innerHTML = `
        <div class="card card-rank rank-accent">
            <div class="kpi">${currentRank.name}</div>
            <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${nextRank? Math.min(100,(xp-currentRank.min)/(nextRank.min-currentRank.min)*100):100}%;background:var(--rank)"></div></div><div class="progress-text">${xp} / ${nextRank?.min||xp} XP</div></div>
            <div class="card-label">🏆 Rank</div>
            <div class="secondary">Next: ${nextRank?.name||'MAX'} ${nextRank?.icon||''}</div>
        </div>
        <div class="card card-streak streak-accent">
            <div class="kpi">${currentStreak}</div>
            <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${Math.min(100,(currentStreak/Math.max(longestStreak,30))*100)}%;background:var(--streak)"></div></div><div class="progress-text">Longest: ${longestStreak} days</div></div>
            <div class="card-label">🔥 Streak</div>
            <div class="secondary">${currentStreak>0?'Keep going!':'Start today!'}</div>
        </div>
        <div class="card card-goal goal-accent">
            <div class="kpi">CUT PHASE</div>
            <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${goalProgress}%;background:var(--goal)"></div></div><div class="progress-text">${goalProgress}% to target (${latestBF.toFixed(1)}% BF)</div></div>
            <div class="card-label">🎯 Goal</div>
            <div class="secondary">Target: ${targetBF}% BF</div>
            <button class="btn" id="logBFBtn" style="background:var(--goal); margin-top:6px;">📊 Log Body Fat</button>
        </div>
        <div class="card card-workout-hero workout-accent">
            <div class="hero-header">
                <span class="badge ${todayType==='Rest'?'badge-rest':'badge-workout'}">${todayType.toUpperCase()}</span>
                <span class="status ${todayCompleted?'status-done':(todayType==='Rest'&&customExercises.length===0?'status-rest':'status-pending')}">${todayType==='Rest'&&customExercises.length===0?'🔋 Recovery':(todayCompleted?'✅ Done':'⚡ Pending')}</span>
            </div>
            <div class="hero-title">${todayName}: ${todayType}</div>
            <div class="hero-details">
                <div>📋 <strong id="totalExCount">${totalEx}</strong> exercises</div>
                <div>⏱ <strong>~${totalEx*5+10}</strong> min</div>
                <div>📅 <strong>Today</strong></div>
                <div>💪 <strong>Progress:</strong> <span id="exProgress">0/${totalEx}</span></div>
            </div>
            <div class="progress-ring"><div class="ring" id="ring" style="background: conic-gradient(var(--workout) 0deg, #1e293b 0deg);"><span>0%</span></div><span style="font-size:0.7rem;color:var(--text-secondary);">completion</span></div>
            <div class="muscle-tags">${todayType!=='Rest'? todayType.split(' + ').map(m=>`<span class="muscle-tag">${m}</span>`).join(''):'<span class="muscle-tag">Recovery</span>'}</div>
            <div style="margin-top:8px;"><label style="font-size:0.7rem;color:var(--text-muted);">Override: </label><select id="overrideSelect" style="background:#1e293b;color:#fff;border:1px solid #334155;border-radius:6px;padding:4px 8px;"><option value="">Auto (Schedule)</option><option value="Chest + Triceps">Chest + Triceps</option><option value="Back + Biceps">Back + Biceps</option><option value="Shoulders">Shoulders</option><option value="Legs">Legs</option><option value="Rest">Rest Day</option></select><button id="clearOverrideBtn" class="btn" style="width:auto; padding:4px 12px; margin-left:8px; background:#334155;">Clear</button></div>
            <div class="collapsible-section" id="planSection"><div class="collapsible-header" id="planToggle"><span style="font-weight:700;">📋 Today's Plan</span><span id="planArrow">▼</span></div><div class="hero-exercises" id="exerciseList"></div></div>
            <div class="collapsible-section" id="customSection"><div class="collapsible-header" style="justify-content:space-between;"><span style="font-weight:700;">🔹 Custom Exercises</span><button id="openModalBtn" class="btn" style="width:auto; padding:8px 16px; background:var(--achievement);">+ Add</button></div><div class="hero-exercises" id="customExerciseList"></div></div>
            <div class="yesterday-tomorrow" id="yt"></div>
            <button class="btn" id="markBtn">✅ Mark Day Complete</button>
        </div>
        <div class="card card-achievement achievement-accent">
            <div style="display:flex;align-items:center;gap:8px;"><span style="font-size:2rem;">${latestAch?.icon||'🔒'}</span><div><strong>${latestAch?.name||'Locked'}</strong><br><small>${latestAch?.tier||''}</small></div></div>
            <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${nextAch? Math.min(100,(latestAch?.progress||0)/nextAch.req*100):100}%;background:var(--achievement)"></div></div><div class="progress-text">${nextAch? `${latestAch?.progress||0}/${nextAch.req} to ${nextAch.icon}`:'All earned!'}</div></div>
            <div class="card-label">🏅 Achievement</div>
        </div>
        <div class="card card-analytics analytics-accent">
            <div class="analytics-grid">
                <div class="mini-stat"><span style="color:var(--analytics);font-weight:800;">${totalWorkouts}</span><small>Workouts</small><canvas id="cvsWorkouts"></canvas></div>
                <div class="mini-stat"><span style="font-weight:800;">${adherence}%</span><small>Adherence</small><canvas id="cvsAdh"></canvas></div>
                <div class="mini-stat"><span style="color:#22C55E;">${totalExercisesAll}</span><small>Exercises done</small></div>
                <div class="mini-stat"><span>${longestStreak}</span><small>Best streak</small></div>
            </div>
            <div class="card-label">📊 Analytics</div>
            <button class="btn" id="openReportBtn" style="margin-top:8px; background:var(--analytics);">📊 Detailed Report</button>
        </div>
        <div class="card card-weekly" id="weeklyCard"><div class="weekly-header" style="grid-column:1/-1;">WEEKLY PLANNER</div></div>
    `;

    // Override handlers
    const overrideSelect = document.getElementById('overrideSelect');
    if (overrideWorkout) overrideSelect.value = overrideWorkout;
    overrideSelect.addEventListener('change', () => { saveOverride(overrideSelect.value || null); location.reload(); });
    document.getElementById('clearOverrideBtn').addEventListener('click', () => { saveOverride(null); location.reload(); });

    // Weekly planner
    try {
        const weekStart = new Date(today); weekStart.setDate(today.getDate()-((today.getDay()+6)%7));
        const weeklyContainer = document.getElementById('weeklyCard');
        for(let i=0;i<7;i++){
            const d=new Date(weekStart); d.setDate(weekStart.getDate()+i);
            const ds=d.toISOString().slice(0,10); const dayShort=['MON','TUE','WED','THU','FRI','SAT','SUN'][i];
            const isToday=ds===todayStr; const isPast=d<today&&!isToday;
            const entry=log.find(e=>e.date===ds);
            let dotClass='rest', label='Rest';
            const planDay = workoutPlan[dayNames[d.getDay()]];
            if(entry?.complete){dotClass='dot-done';label='Done';}
            else if(isPast&&planDay.muscle!=='Rest'){dotClass='dot-missed';label='Missed';}
            else if(isToday&&todayType!=='Rest'){dotClass=todayCompleted?'dot-done':'dot-planned';label='Today';}
            else if(planDay.muscle!=='Rest'){dotClass='dot-planned';label='Planned';}
            const div=document.createElement('div'); div.className=`weekly-day${isToday?' today':''}`;
            div.innerHTML=`<span style="font-size:0.6rem;">${dayShort}</span><div class="dot ${dotClass}"></div><span style="font-size:0.55rem;color:var(--text-muted);">${label}</span>`;
            weeklyContainer.appendChild(div);
        }
    } catch(e) {}

    // Exercise list
    const exerciseListEl = document.getElementById('exerciseList');
    if (todayType !== 'Rest') {
        exerciseListEl.innerHTML = todayExercises.map(ex => {
            const checked = todayExercisesDone.includes(ex);
            const disabled = todayCompleted ? 'disabled' : '';
            return `<div class="ex-row"><input type="checkbox" value="${ex}" ${checked?'checked':''} ${disabled}> ${ex}</div>`;
        }).join('');
    } else exerciseListEl.innerHTML = '<div style="color:#64748b;">Active recovery or mobility</div>';

    // Custom exercises
    const customExerciseListEl = document.getElementById('customExerciseList');
    function renderCustomExercises() {
        const list = getCustomExercises();
        if (list.length > 0) {
            customExerciseListEl.innerHTML = list.map(ce => {
                const checked = getTodayExercisesDone().includes(ce.name);
                const disabled = isTodayCompleted() ? 'disabled' : '';
                return `<div class="ex-row custom-exercise" data-custom-id="${ce.id}">
                    <input type="checkbox" value="${ce.name}" ${checked?'checked':''} ${disabled}>
                    <span style="flex:1;">${ce.name} <small style="color:var(--text-muted);">${ce.sets}×${ce.reps}</small> <span class="custom-badge">Custom</span></span>
                    <button class="edit-btn">✏️</button><button class="delete-btn">🗑️</button>
                </div>`;
            }).join('');
            customExerciseListEl.querySelectorAll('.custom-exercise').forEach(row => {
                const id = row.dataset.customId;
                const ce = getCustomExercises().find(c => c.id === id);
                if (!ce) return;
                row.querySelector('.edit-btn').addEventListener('click', (e) => { e.stopPropagation(); openCustomModal(ce); });
                row.querySelector('.delete-btn').addEventListener('click', (e) => { e.stopPropagation(); if(confirm('Delete?')){let entry=getTodayEntry();if(entry){entry.customExercises=entry.customExercises.filter(c=>c.id!==id);entry.exercisesCompleted=entry.exercisesCompleted.filter(n=>n!==ce.name);saveLog();renderCustomExercises();refreshUI();}} });
                row.querySelector('input[type="checkbox"]').addEventListener('change', updateRing);
            });
        } else customExerciseListEl.innerHTML = '<div style="color:var(--text-muted); font-size:0.7rem;">No custom exercises</div>';
    }
    renderCustomExercises();

    function updateRing() {
        const checks = document.querySelectorAll('#exerciseList input[type="checkbox"]:checked, #customExerciseList input[type="checkbox"]:checked');
        const pct = totalEx ? Math.round((checks.length/totalEx)*100) : 0;
        const ring = document.getElementById('ring'); if (ring) { const deg = totalEx ? (checks.length/totalEx)*360 : 0; ring.style.background = `conic-gradient(var(--workout) ${deg}deg, #1e293b ${deg}deg)`; ring.innerHTML = `<span>${pct}%</span>`; }
        document.getElementById('exProgress').textContent = `${checks.length}/${totalEx}`;
        document.getElementById('totalExCount').textContent = totalEx;
    }
    function refreshUI() { updateRing(); }
    document.querySelectorAll('#exerciseList input[type="checkbox"]').forEach(cb => cb.addEventListener('change', updateRing));
    updateRing();

    const markBtn = document.getElementById('markBtn');
    markBtn.style.display = (totalEx > 0 && !todayCompleted) ? 'block' : 'none';

    document.getElementById('planToggle').addEventListener('click', () => {
        const list = document.getElementById('exerciseList'); const arrow = document.getElementById('planArrow');
        if (list.style.display === 'none') { list.style.display = ''; arrow.textContent = '▼'; }
        else { list.style.display = 'none'; arrow.textContent = '▶'; }
    });

    const yest = new Date(today); yest.setDate(yest.getDate()-1);
    const yestName = dayNames[yest.getDay()];
    const yestDone = log.find(e=>e.date===yest.toISOString().slice(0,10) && e.complete);
    const tom = new Date(today); tom.setDate(tom.getDate()+1);
    const tomName = dayNames[tom.getDay()];
    document.getElementById('yt').innerHTML = `Yesterday: ${workoutPlan[yestName].muscle} ${yestDone?'✅':'❌'}  |  Tomorrow: ${workoutPlan[tomName].muscle} 📋`;

    // Custom modal (simplified)
    const modal = document.getElementById('customModal');
    const modalName = document.getElementById('modalName'), modalSets = document.getElementById('modalSets'), modalReps = document.getElementById('modalReps');
    const modalSaveBtn = document.getElementById('modalSaveBtn'), modalCancelBtn = document.getElementById('modalCancelBtn'), modalDeleteBtn = document.getElementById('modalDeleteBtn');
    let editingId = null;
    function openCustomModal(ex = null) {
        if (ex) { editingId = ex.id; modalName.value = ex.name; modalSets.value = ex.sets; modalReps.value = ex.reps; modalDeleteBtn.style.display = 'block'; }
        else { editingId = null; modalName.value = ''; modalSets.value = '3'; modalReps.value = '10'; modalDeleteBtn.style.display = 'none'; }
        modal.classList.add('active');
    }
    document.getElementById('openModalBtn').addEventListener('click', () => openCustomModal());
    modalCancelBtn.addEventListener('click', () => { modal.classList.remove('active'); });
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
    modalSaveBtn.addEventListener('click', () => {
        const name = modalName.value.trim(); if (!name) return alert('Exercise name required');
        const sets = parseInt(modalSets.value)||3, reps = modalReps.value.trim()||'10';
        let entry = log.find(e => e.date === todayStr);
        if (!entry) { entry = { date: todayStr, day: todayName, exercisesCompleted: [], complete: false, customExercises: [] }; log.push(entry); }
        entry.customExercises = entry.customExercises || [];
        if (editingId) {
            const idx = entry.customExercises.findIndex(c => c.id === editingId);
            if (idx !== -1) { const oldName = entry.customExercises[idx].name; entry.customExercises[idx] = { id: editingId, name, sets, reps }; if (entry.exercisesCompleted.includes(oldName)) entry.exercisesCompleted[entry.exercisesCompleted.indexOf(oldName)] = name; }
        } else entry.customExercises.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2), name, sets, reps });
        saveLog(); modal.classList.remove('active'); renderCustomExercises(); refreshUI();
    });
    modalDeleteBtn.addEventListener('click', () => { if (!editingId) return; if (!confirm('Delete?')) return; let entry = log.find(e => e.date === todayStr); if (entry) { entry.customExercises = entry.customExercises.filter(c => c.id !== editingId); entry.exercisesCompleted = entry.exercisesCompleted.filter(n => n !== (entry.customExercises.find(c=>c.id===editingId)?.name)); saveLog(); modal.classList.remove('active'); renderCustomExercises(); refreshUI(); } });

    markBtn.addEventListener('click', ()=>{
        const checked = [...document.querySelectorAll('#exerciseList input[type="checkbox"]:checked, #customExerciseList input[type="checkbox"]:checked')].map(c=>c.value);
        if(checked.length===0) return alert('Select at least one exercise!');
        const idx = log.findIndex(e=>e.date===todayStr);
        if(idx!==-1) { log[idx].exercisesCompleted = checked; log[idx].complete = true; }
        else log.push({ date:todayStr, day:todayName, exercisesCompleted:checked, complete:true, customExercises: getCustomExercises() });
        saveLog(); location.reload();
    });

    // Body fat modal
    const bfModal = document.getElementById('bodyFatModal');
    document.getElementById('logBFBtn').addEventListener('click', () => bfModal.classList.add('active'));
    document.getElementById('bfCancelBtn').addEventListener('click', () => bfModal.classList.remove('active'));
    document.getElementById('bfSaveBtn').addEventListener('click', () => {
        const bf = parseFloat(document.getElementById('bfInput').value);
        if (isNaN(bf) || bf <= 0) return alert('Valid BF % required');
        bfLog.push({ date: todayStr, bodyFat: bf, weight: parseFloat(document.getElementById('weightInput').value)||0 });
        saveBFLog(); location.reload();
    });

    // Sparklines
    const drawSpark = (canvasId, data, color) => {
        const canvas = document.getElementById(canvasId); if(!canvas) return;
        const ctx = canvas.getContext('2d'); const resizeAndDraw = () => { canvas.width = canvas.offsetWidth||100; canvas.height = canvas.offsetHeight||36; const w=canvas.width, h=canvas.height; if(w===0||h===0) return; const max=Math.max(...data,1); ctx.clearRect(0,0,w,h); ctx.beginPath(); ctx.strokeStyle=color; ctx.lineWidth=2; data.forEach((v,i)=>{ const x=i/(data.length-1)*w; const y=h-(v/max)*h*0.8; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke(); ctx.lineTo(w,h); ctx.lineTo(0,h); ctx.closePath(); ctx.fillStyle = color+'15'; ctx.fill(); };
        resizeAndDraw(); if (typeof ResizeObserver !== 'undefined') { try { new ResizeObserver(resizeAndDraw).observe(canvas); } catch(e) {} }
    };
    const weeklyVolumes = []; for (let w=9; w>=0; w--) { const end = new Date(today); end.setDate(today.getDate() - w*7); const start = new Date(end); start.setDate(end.getDate()-6); weeklyVolumes.push(log.filter(e => { let d=new Date(e.date); return e.complete && d>=start && d<=end; }).length); }
    const adherenceData = []; for (let m=5; m>=0; m--) { const ref = new Date(today.getFullYear(), today.getMonth()-m, 1); const end = new Date(today.getFullYear(), today.getMonth()-m+1, 0); const monthWorkouts = log.filter(e => e.complete && new Date(e.date)>=ref && new Date(e.date)<=end).length; const daysInMonth = (end-ref)/864e5 + 1; const expected = Math.round((daysInMonth/7)*5); adherenceData.push(expected ? Math.round(monthWorkouts/expected*100) : 0); }
    setTimeout(()=>{ drawSpark('cvsWorkouts', weeklyVolumes.length ? weeklyVolumes : [0], '#06B6D4'); drawSpark('cvsAdh', adherenceData.length ? adherenceData : [0], '#22C55E'); },100);

    // Report (simplified, same as before)
    const reportOverlay = document.getElementById('reportOverlay'), reportContent = document.getElementById('reportContent'), reportTabs = document.getElementById('reportTabs');
    document.getElementById('openReportBtn').addEventListener('click', () => { reportOverlay.classList.add('active'); switchTab('monthly'); });
    document.getElementById('closeReportBtn').addEventListener('click', () => reportOverlay.classList.remove('active'));
    reportOverlay.addEventListener('click', (e) => { if (e.target === reportOverlay) reportOverlay.classList.remove('active'); });
    reportTabs.querySelectorAll('.report-tab').forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));
    function switchTab(tabName) { reportTabs.querySelectorAll('.report-tab').forEach(t => t.classList.remove('active')); const active = reportTabs.querySelector(`[data-tab="${tabName}"]`); if (active) active.classList.add('active'); generateReportContent(tabName); }
    function generateReportContent(tab) {
        let html = '';
        try {
            if (tab === 'monthly') { html = '<h3>Monthly Summary</h3><table><tr><th>Month</th><th>Workouts</th><th>Exercises</th><th>Adherence</th><th>Avg BF</th></tr>'; for (let m = 5; m >= 0; m--) { const ref = new Date(today.getFullYear(), today.getMonth() - m, 1); const end = new Date(today.getFullYear(), today.getMonth() - m + 1, 0); const monthEntries = log.filter(e => e.complete && new Date(e.date) >= ref && new Date(e.date) <= end); const workouts = monthEntries.length; const exercises = monthEntries.reduce((s, e) => s + (e.exercisesCompleted?.length || 0), 0); const daysInMonth = (end - ref) / 864e5 + 1; const expected = Math.round((daysInMonth / 7) * 5); const consistency = expected ? Math.round((workouts / expected) * 100) : 0; const monthBFs = bfLog.filter(e => { const d = new Date(e.date); return d >= ref && d <= end; }); const avgBF = monthBFs.length ? (monthBFs.reduce((s,x)=>s+x.bodyFat,0)/monthBFs.length).toFixed(1) : '—'; html += `<tr><td>${ref.toLocaleString('default', { month:'short', year:'numeric' })}</td><td>${workouts}</td><td>${exercises}</td><td>${consistency}%</td><td>${avgBF}</td></tr>`; } html += '</table>'; }
            else if (tab === 'exercises') { const freq = {}; log.filter(e => e.complete).forEach(e => { (e.exercisesCompleted || []).forEach(ex => freq[ex] = (freq[ex]||0)+1); }); html = '<h3>Exercise Frequency</h3><table><tr><th>Exercise</th><th>Times Done</th></tr>'; Object.entries(freq).sort((a,b) => b[1]-a[1]).forEach(([n,c]) => html += `<tr><td>${n}</td><td>${c}</td></tr>`); if (!Object.keys(freq).length) html += '<tr><td colspan="2">No data</td></tr>'; html += '</table>'; }
            else if (tab === 'trends') { html = '<h3>Weekly Volume Trend</h3><canvas id="bigSpark" style="width:100%; height:200px;"></canvas>'; setTimeout(() => { const canvas = document.getElementById('bigSpark'); if (!canvas) return; canvas.width = canvas.offsetWidth; canvas.height = 200; const ctx = canvas.getContext('2d'); const data = weeklyVolumes; const w = canvas.width, h = canvas.height; const max = Math.max(...data,1); ctx.clearRect(0,0,w,h); ctx.beginPath(); ctx.strokeStyle = '#3B82F6'; ctx.lineWidth = 3; data.forEach((v,i)=>{ const x = i/(data.length-1)*w; const y = h - (v/max)*h*0.8; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); }); ctx.stroke(); }, 100); }
            else if (tab === 'calendar') { const start = new Date(today.getFullYear(), today.getMonth()-2, 1); const end = today; html = '<h3>Consistency Heatmap (last 3 months)</h3><div class="heatmap-grid">'; for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) { const ds = d.toISOString().slice(0,10); const dayOfWeek = d.getDay(); if (dayOfWeek === 0) { html += '<div class="heatmap-cell rest"></div>'; continue; } const entry = log.find(e => e.date === ds && e.complete); html += `<div class="heatmap-cell ${entry?'done':'missed'}" title="${ds}"></div>`; } html += '</div>'; }
            else if (tab === 'missed') { const missedDays = []; for (let d = new Date(today.getFullYear(), today.getMonth()-1, 1); d <= today; d.setDate(d.getDate()+1)) { if (d.getDay() !== 0) { const ds = d.toISOString().slice(0,10); if (!log.find(e => e.date === ds && e.complete)) missedDays.push(ds); } } html = '<h3>Missed Days</h3>'; if (missedDays.length === 0) html += '<p>None! 🎉</p>'; else { html += '<ul>'; missedDays.forEach(d => html += `<li>${d}</li>`); html += '</ul>'; } }
            else if (tab === 'comparison') { const currStart = new Date(today.getFullYear(), today.getMonth(), 1); const lastStart = new Date(today.getFullYear(), today.getMonth()-1, 1); const lastEnd = new Date(today.getFullYear(), today.getMonth(), 0); const curr = log.filter(e => e.complete && new Date(e.date) >= currStart && new Date(e.date) <= today).length; const last = log.filter(e => e.complete && new Date(e.date) >= lastStart && new Date(e.date) <= lastEnd).length; html = `<h3>Comparison</h3><p>This month: <strong>${curr}</strong> workouts</p><p>Last month: <strong>${last}</strong> workouts</p>`; }
        } catch(e) { html = '<p style="color:var(--danger);">Error loading report section.</p>'; }
        reportContent.innerHTML = html;
    }
})();
</script>
</body>
</html>
