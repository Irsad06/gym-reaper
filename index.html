<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0B1220">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
    <title>GYM REAPER OS v3.1</title>
    <style>
        :root {
            --bg: #0B1220; --card: #121C2F; --text: #FFFFFF; --text-secondary: #94a3b8;
            --text-muted: #64748b; --accent: #3B82F6; --rank: #A855F7; --streak: #F97316;
            --goal: #22C55E; --achievement: #FACC15; --danger: #EF4444; --radius: 14px; --gap: 10px;
            --nav-height: 64px; --font: 'Inter', system-ui, -apple-system, sans-serif;
            --header-bg: #0f172a;
        }
        .light {
            --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --text-secondary: #475569;
            --text-muted: #94a3b8; --header-bg: #e2e8f0;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); color: var(--text); font-family: var(--font);
            min-height: 100dvh; overflow-x: hidden; -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent; transition: background 0.3s, color 0.3s;
        }
        #app { max-width: 800px; margin:0 auto; padding-bottom: calc(var(--nav-height) + 20px); }
        .page { display:none; padding: 12px; }
        .page.active { display:block; }
        .card {
            background: var(--card); border-radius: var(--radius); padding: 14px 16px;
            margin-bottom: var(--gap); box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .card-header {
            font-weight: 700; font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--text-muted); margin-bottom: 8px;
        }
        .kpi-row { display: flex; gap: var(--gap); margin-bottom: var(--gap); }
        .kpi-card {
            flex:1; background: var(--card); border-radius: var(--radius); padding: 12px;
            text-align: center; border-top: 3px solid var(--accent);
        }
        .kpi-val { font-size: 1.8rem; font-weight: 900; }
        .kpi-lbl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
        .btn {
            background: var(--accent); color:#fff; border:none; padding:10px 16px; border-radius:10px;
            font-weight:700; font-size:0.78rem; cursor:pointer; width:100%; text-align:center;
            letter-spacing: 0.03em; transition: 0.15s; touch-action: manipulation;
        }
        .btn:active { transform:scale(0.97); }
        .btn-sm { padding:6px 12px; font-size:0.7rem; width:auto; }
        .btn-outline { background:transparent; border:1px solid var(--accent); color:var(--accent); }
        .btn-danger { background:var(--danger); }
        .btn-big { padding:16px; font-size:1rem; border-radius:14px; }
        .btn-success { background:var(--goal); }
        .progress-bar { height:6px; border-radius:6px; background:rgba(255,255,255,0.08); overflow:hidden; }
        .progress-fill { height:100%; border-radius:6px; transition:width 0.5s; }
        input, select, textarea {
            width:100%; padding:10px; border-radius:8px; border:1px solid rgba(255,255,255,0.1);
            background: var(--bg); color:var(--text); font-size:0.8rem; margin:4px 0; font-family: var(--font);
        }
        .bottom-nav {
            position:fixed; bottom:0; left:0; right:0; height:var(--nav-height);
            background:var(--header-bg); display:flex; z-index:999;
            border-top:1px solid rgba(255,255,255,0.05); justify-content:space-around; align-items:center;
        }
        .nav-item {
            flex:1; text-align:center; color:var(--text-muted); font-size:0.6rem;
            cursor:pointer; padding:6px 0; transition:0.2s; display:flex;
            flex-direction:column; align-items:center; gap:2px; touch-action: manipulation;
        }
        .nav-item.active { color:var(--accent); }
        .nav-icon { font-size:1.3rem; }
        .modal-overlay {
            position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.7);
            z-index:1000; display:flex; align-items:flex-end; justify-content:center;
            visibility:hidden; opacity:0; transition:0.2s;
        }
        .modal-overlay.active { visibility:visible; opacity:1; }
        .modal-content {
            width:100%; max-width:500px; background:var(--card); border-radius:18px 18px 0 0;
            padding:20px; max-height:80vh; overflow-y:auto; transform:translateY(100%); transition:0.3s;
        }
        .modal-overlay.active .modal-content { transform:translateY(0); }
        .set-row { display:flex; gap:8px; align-items:center; margin:4px 0; }
        .set-row input { width:60px; padding:6px; text-align:center; }
        .set-row .set-num { width:24px; font-weight:700; color:var(--text-muted); font-size:0.7rem; }
        .timer-float {
            position:fixed; bottom:80px; right:16px; z-index:998; background:var(--accent);
            color:#fff; width:56px; height:56px; border-radius:50%; display:flex;
            align-items:center; justify-content:center; font-weight:900; font-size:1rem;
            cursor:pointer; box-shadow:0 4px 16px rgba(59,130,246,0.4); transition:0.2s;
            touch-action: manipulation; border:none;
        }
        .timer-float.running { background:var(--danger); animation:pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .toast {
            position:fixed; bottom:100px; left:50%; transform:translateX(-50%); z-index:2000;
            background:#1e293b; color:#fff; padding:10px 20px; border-radius:20px;
            font-size:0.75rem; opacity:0; transition:0.3s; pointer-events:none;
        }
        .toast.show { opacity:1; }
        .celebration {
            position:fixed; top:0;left:0;right:0;bottom:0; z-index:3000; display:flex;
            align-items:center; justify-content:center; pointer-events:none;
            font-size:4rem; animation:celebrate 1.5s ease forwards;
        }
        @keyframes celebrate { 0%{opacity:0;transform:scale(2)} 30%{opacity:1;transform:scale(1)} 100%{opacity:0;transform:scale(0.8)} }
        .tag {
            display:inline-block; padding:4px 10px; border-radius:12px; font-size:0.65rem;
            font-weight:600; margin:2px; cursor:pointer; touch-action: manipulation;
        }
        .tag-active { background:var(--accent); color:#fff; }
        .tag-inactive { background:rgba(255,255,255,0.05); color:var(--text-secondary); }
        .chart-bar {
            display:flex; align-items:flex-end; gap:4px; height:120px; padding:4px 0;
        }
        .chart-bar .bar {
            flex:1; background:var(--accent); border-radius:4px 4px 0 0; min-width:8px;
            transition:height 0.4s; position:relative;
        }
        .chart-bar .bar span {
            position:absolute; bottom:-18px; left:50%; transform:translateX(-50%);
            font-size:0.55rem; color:var(--text-muted);
        }
        /* Walk-Through Overlay */
        .walkthrough-overlay {
            position:fixed; top:0;left:0;right:0;bottom:0; background:var(--bg); z-index:500;
            display:flex; flex-direction:column; padding:20px; padding-top:max(20px, env(safe-area-inset-top));
            padding-bottom:max(20px, env(safe-area-inset-bottom));
            transform:translateX(100%); transition:0.35s cubic-bezier(0.4,0,0.2,1);
        }
        .walkthrough-overlay.active { transform:translateX(0); }
        .wt-exercise-name { font-size:1.6rem; font-weight:900; text-align:center; margin:8px 0; }
        .wt-set-indicator { text-align:center; color:var(--text-muted); font-size:0.8rem; margin-bottom:8px; }
        .wt-big-input {
            text-align:center; font-size:2.5rem; font-weight:900; padding:16px; border-radius:16px;
            background:var(--card); border:2px solid var(--accent); width:100%; margin:8px 0;
            color:var(--text); -moz-appearance:textfield;
        }
        .wt-big-input::-webkit-outer-spin-button, .wt-big-input::-webkit-inner-spin-button { opacity:1; height:40px; }
        .wt-quick-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin:8px 0; }
        .wt-quick-btn {
            padding:10px 18px; border-radius:20px; border:1px solid var(--accent);
            background:transparent; color:var(--accent); font-weight:700; font-size:0.85rem;
            cursor:pointer; touch-action: manipulation;
        }
        .wt-quick-btn:active { background:var(--accent); color:#fff; }
        .wt-timer-display { text-align:center; font-size:3rem; font-weight:900; margin:16px 0; color:var(--danger); }
        .wt-progress { height:4px; background:rgba(255,255,255,0.08); border-radius:4px; margin:8px 0; overflow:hidden; }
        .wt-progress-fill { height:100%; background:var(--accent); border-radius:4px; transition:width 0.3s; }
        .wt-check-animation {
            position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:600;
            font-size:5rem; pointer-events:none; opacity:0; transition:0.3s;
        }
        .wt-check-animation.show { opacity:1; animation:popIn 0.5s ease; }
        @keyframes popIn { 0%{transform:translate(-50%,-50%) scale(0)} 70%{transform:translate(-50%,-50%) scale(1.2)} 100%{transform:translate(-50%,-50%) scale(1)} }
        .wt-summary { text-align:center; }
        .wt-summary h2 { font-size:1.5rem; margin:8px 0; }
        .wt-summary-stat { font-size:1.2rem; margin:4px 0; color:var(--text-secondary); }
        @media(max-width:500px) {
            .kpi-row { flex-wrap:wrap; } .kpi-card { min-width:45%; }
            .wt-exercise-name { font-size:1.3rem; }
            .wt-big-input { font-size:2rem; }
        }
    </style>
</head>
<body>
<div id="app">
    <div class="page active" id="page-workout"></div>
    <div class="page" id="page-history"></div>
    <div class="page" id="page-analytics"></div>
    <div class="page" id="page-library"></div>
    <div class="page" id="page-settings"></div>
</div>

<div class="bottom-nav">
    <div class="nav-item active" data-page="workout"><span class="nav-icon">⚡</span>Workout</div>
    <div class="nav-item" data-page="history"><span class="nav-icon">📅</span>History</div>
    <div class="nav-item" data-page="analytics"><span class="nav-icon">📊</span>Analytics</div>
    <div class="nav-item" data-page="library"><span class="nav-icon">📚</span>Library</div>
    <div class="nav-item" data-page="settings"><span class="nav-icon">⚙️</span>Settings</div>
</div>

<div class="timer-float" id="timerFloat" title="Rest Timer">⏱</div>
<div class="toast" id="toast"></div>
<div class="celebration" id="celebration"></div>
<div class="wt-check-animation" id="wtCheckAnim">✅</div>
<div class="walkthrough-overlay" id="walkthroughOverlay"></div>
<div class="modal-overlay" id="modal"><div class="modal-content" id="modalContent"></div></div>

<script>
(function(){
'use strict';
const S=(s,p=document)=>p.querySelector(s), SA=(s,p=document)=>[...p.querySelectorAll(s)];
const today=new Date(), todayStr=today.toISOString().slice(0,10);
const dayNames=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const todayName=dayNames[today.getDay()];

// ── STATE ──────────────────────────────
let log=[], bfLog=[], templates={}, measurements=[], settings={};
let currentPage='workout', editingSetId=null, timerSec=90, timerRunning=false, timerInterval=null;
let wtState=null; // Walk-through state

try{ log=JSON.parse(localStorage.gymReaperLog||'[]'); }catch(e){}
try{ bfLog=JSON.parse(localStorage.gymReaperBFLog||'[]'); }catch(e){}
try{ templates=JSON.parse(localStorage.gymReaperTemplates||'{"Push Day":["Bench Press","Overhead Press","Dips"],"Pull Day":["Deadlift","Barbell Row","Pull-Ups"],"Leg Day":["Squat","Leg Press","Calf Raises"]}'); }catch(e){}
try{ measurements=JSON.parse(localStorage.gymReaperMeasurements||'[]'); }catch(e){}
try{ settings=JSON.parse(localStorage.gymReaperSettings||'{"theme":"dark","restTimer":90,"streakFreeze":0}'); }catch(e){}
if(settings.theme==='light') document.body.classList.add('light');

const defaultTemplates={
    'Chest + Triceps':['Bench Press','Incline Dumbbell Press','Cable Flyes','Tricep Pushdown','Skull Crushers','Dips'],
    'Back + Biceps':['Deadlift','Barbell Row','Lat Pulldown','Face Pulls','Barbell Curls','Hammer Curls'],
    'Shoulders':['Overhead Press','Lateral Raises','Front Raises','Rear Delt Fly','Arnold Press','Shrugs'],
    'Legs':['Squat','Romanian Deadlift','Leg Press','Leg Curl','Calf Raises','Lunges']
};
const weekSched={Monday:'Chest + Triceps',Tuesday:'Back + Biceps',Wednesday:'Shoulders',Thursday:'Chest + Triceps',Friday:'Back + Biceps',Saturday:'Legs',Sunday:'Rest'};
const muscleGroups=['Chest','Back','Shoulders','Biceps','Triceps','Legs','Core','Full Body'];
const allExercises=[...new Set([...Object.values(defaultTemplates).flat(),...Object.values(templates).flat()])];

function save(k,v){ try{ localStorage[k]=JSON.stringify(v); }catch(e){} }
function getTodayEntry(){ return log.find(e=>e.date===todayStr)||null; }
function getTodayType(){
    const ov=localStorage.gymReaperOverride;
    if(ov&&(defaultTemplates[ov]||templates[ov])) return ov;
    return weekSched[todayName]||'Rest';
}
function getTodayExs(){
    const t=getTodayType();
    return (defaultTemplates[t]||templates[t]||[]);
}
const todayEntry=getTodayEntry();
const todayCompleted=todayEntry?.complete||false;
const todaySets=todayEntry?.sets||[];
const todayNotes=todayEntry?.notes||'';
const todayType=getTodayType();
const todayExs=getTodayExs();
const totalEx=todayExs.length;

// ── COMPUTED ────────────────────────────
const totalWorkouts=log.filter(e=>e.complete).length;
const currentStreak=(()=>{let s=todayCompleted?1:0,d=new Date(today);if(!todayCompleted)d.setDate(d.getDate()-1);while(true){d.setDate(d.getDate()-1);if(log.find(e=>e.date===d.toISOString().slice(0,10)&&e.complete))s++;else break;}return s;})();
const longestStreak=(()=>{const dates=log.filter(e=>e.complete).map(e=>e.date).sort();let mx=0,cur=0,prev=null;for(let d of dates){const nd=new Date(d);if(prev){if((nd-prev)/864e5===1)cur++;else{mx=Math.max(mx,cur);cur=1;}}else cur=1;prev=nd;}return Math.max(mx,cur,0);})();
const xp=totalWorkouts*25+(currentStreak>=7?35:0)+(currentStreak>=30?150:0);
const rankTiers=[
    {name:'Novice',min:0,icon:'🌱'},{name:'Beginner',min:100,icon:'💪'},{name:'Warrior I',min:300,icon:'⚔️'},
    {name:'Warrior II',min:600,icon:'🗡️'},{name:'Warrior III',min:1000,icon:'⚡'},{name:'Elite I',min:1500,icon:'🔥'},
    {name:'Elite II',min:2500,icon:'💥'},{name:'Champion',min:4000,icon:'🏆'},{name:'Legend',min:6000,icon:'👑'},
    {name:'Reaper',min:10000,icon:'💀'}
];
let cr=rankTiers[0];for(let r of rankTiers)if(xp>=r.min)cr=r;
const nextRank=rankTiers[rankTiers.indexOf(cr)+1]||null;
const targetBF=8.0,startBF=bfLog.length>0?bfLog[0].bodyFat:13.2,latestBF=bfLog.length>0?bfLog[bfLog.length-1].bodyFat:startBF;
const goalProgress=Math.min(100,Math.max(0,Math.round((startBF-latestBF)/(startBF-targetBF)*100)));

// ─�� HELPERS ─────────────────────────────
function S_esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
function toast(msg){const t=S('#toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
function celebrate(icon='🎉'){const c=S('#celebration');c.textContent=icon;c.style.animation='none';void c.offsetHeight;c.style.animation='celebrate 1.5s ease forwards';}
function showCheckAnim(){const el=S('#wtCheckAnim');el.classList.add('show');setTimeout(()=>el.classList.remove('show'),600);}
function getLastWeight(exercise){
    const allSets=log.flatMap(e=>(e.sets||[]).filter(s=>s.exercise===exercise));
    return allSets.length>0?allSets[allSets.length-1].weight:60;
}
function checkPR(ex,weight,reps){
    const allSets=log.flatMap(e=>e.sets||[]).filter(s=>s.exercise===ex);
    const maxW=allSets.length?Math.max(...allSets.map(s=>s.weight||0)):0;
    if(weight>maxW&&maxW>0){toast(`🏆 New PR for ${ex}: ${weight}kg!`);celebrate('💪');}
}
function getOrCreateTodayEntry(){
    let e=log.find(x=>x.date===todayStr);
    if(!e){e={date:todayStr,day:todayName,sets:[],notes:'',complete:false};log.push(e);}
    return e;
}

// ── NAVIGATION ──────────────────────────
function navTo(page){
    SA('.page').forEach(p=>p.classList.remove('active'));
    SA('.nav-item').forEach(n=>n.classList.remove('active'));
    S(`#page-${page}`).classList.add('active');
    SA('.nav-item').find(n=>n.dataset.page===page)?.classList.add('active');
    currentPage=page;
    if(page==='workout')renderWorkout();
    if(page==='history')renderHistory();
    if(page==='analytics')renderAnalytics();
    if(page==='library')renderLibrary();
    if(page==='settings')renderSettings();
}
SA('.nav-item').forEach(n=>n.addEventListener('click',()=>navTo(n.dataset.page)));

// ── WORKOUT PAGE ─────────────────────────
function renderWorkout(){
    const el=S('#page-workout');
    let html=`<div class="kpi-row">
        <div class="kpi-card" style="border-color:var(--rank)"><div class="kpi-val">${cr.icon} ${cr.name}</div><div class="kpi-lbl">🏆 Rank · ${xp} XP</div></div>
        <div class="kpi-card" style="border-color:var(--streak)"><div class="kpi-val">${currentStreak}</div><div class="kpi-lbl">🔥 Streak</div></div>
        <div class="kpi-card" style="border-color:var(--goal)"><div class="kpi-val">${goalProgress}%</div><div class="kpi-lbl">🎯 Goal · ${latestBF.toFixed(1)}% BF</div></div>
    </div>`;
    html+=`<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <span style="font-weight:900;font-size:1.2rem;">${todayName}: <span style="color:var(--accent)">${todayType}</span></span>
            <span style="font-size:0.7rem;color:${todayCompleted?'var(--goal)':'var(--text-muted)'}">${todayCompleted?'✅ Done':'⚡ Pending'}</span>
        </div>
        <div style="margin:6px 0;font-size:0.75rem;color:var(--text-secondary);">Override:
            <select id="overrideSelect" onchange="(function(v){localStorage.gymReaperOverride=v||'';location.reload()})(this.value)" style="width:auto;padding:4px 8px;font-size:0.7rem;">
                <option value="">Auto</option>${[...Object.keys(defaultTemplates),...Object.keys(templates)].map(t=>`<option value="${t}" ${(localStorage.gymReaperOverride||'')===t?'selected':''}>${t}</option>`).join('')}
            </select>
            ${localStorage.gymReaperOverride?`<button class="btn btn-sm btn-outline" onclick="localStorage.removeItem('gymReaperOverride');location.reload()">Clear</button>`:''}
        </div>`;

    if(todayType!=='Rest'){
        if(!todayCompleted){
            html+=`<button class="btn btn-big btn-success" onclick="startWalkthrough()" style="margin:10px 0;">▶ Start Workout (Walk-Through)</button>`;
        }
        html+=`<div style="margin:8px 0;"><strong>📋 Exercises</strong></div>`;
        todayExs.forEach((ex,i)=>{
            const setsForEx=todaySets.filter(s=>s.exercise===ex);
            html+=`<div style="background:var(--bg);border-radius:10px;padding:10px;margin:6px 0;">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-weight:700;font-size:0.85rem;">${i+1}. ${S_esc(ex)}</span>
                    <button class="btn btn-sm" onclick="openSetLogger('${S_esc(ex)}',${i})">+ Set</button>
                </div>`;
            if(setsForEx.length>0){
                html+=`<div style="margin-top:6px;font-size:0.7rem;color:var(--text-secondary);">`;
                setsForEx.forEach((s,j)=>{
                    html+=`<div style="display:flex;gap:8px;align-items:center;padding:3px 0;">
                        <span style="width:20px;">#${j+1}</span><span>${s.weight||'BW'} × ${s.reps||0}</span>
                        ${s.rpe?`<span style="color:var(--text-muted)">RPE ${s.rpe}</span>`:''}
                        <button class="btn btn-sm btn-outline" style="padding:2px 6px;font-size:0.6rem;" onclick="deleteSet('${S_esc(ex)}',${j})">✕</button></div>`;
                });
                html+=`</div>`;
            }
            html+=`</div>`;
        });
        html+=`<div style="margin:10px 0;"><label style="font-size:0.7rem;color:var(--text-muted);">📝 Notes</label>
            <textarea id="workoutNotes" rows="2" placeholder="Mood, energy, injury notes..." onblur="saveNotesAuto(this.value)">${S_esc(todayNotes)}</textarea></div>`;
        if(!todayCompleted){
            html+=`<button class="btn" id="markCompleteBtn" style="margin-top:8px;">✅ Mark Day Complete</button>`;
        }else{
            html+=`<button class="btn" disabled style="margin-top:8px;opacity:0.5;">✅ Completed</button>`;
        }
    }else{
        html+=`<div style="text-align:center;padding:20px;color:var(--text-muted);">🔋 Rest Day — Active recovery</div>`;
    }
    html+=`</div>`;
    el.innerHTML=html;
    if(!todayCompleted&&todayType!=='Rest'){
        S('#markCompleteBtn').addEventListener('click',()=>{
            if(!confirm('Mark today\'s workout as complete?'))return;
            const e=getOrCreateTodayEntry();
            e.complete=true;e.notes=S('#workoutNotes')?.value||'';
            save('gymReaperLog',log);toast('✅ Workout completed!');celebrate('🏆');
            setTimeout(()=>location.reload(),1500);
        });
    }
}

// ── WALK-THROUGH MODE ────────────────────
window.startWalkthrough=function(){
    const exs=todayExs; if(exs.length===0)return toast('No exercises for today');
    wtState={
        exIndex:0, setNum:1, totalSetsPerEx:4, currentWeight:getLastWeight(exs[0]),
        currentReps:10, currentRPE:7, isResting:false, restSeconds:settings.restTimer||90,
        totalSetsDone:0, totalVolume:0, prsHit:0
    };
    renderWalkthrough();
    S('#walkthroughOverlay').classList.add('active');
};
function renderWalkthrough(){
    const overlay=S('#walkthroughOverlay');
    const ex=todayExs[wtState.exIndex];
    const totalExs=todayExs.length;
    const overallProgress=Math.round((wtState.exIndex/totalExs)*100);
    if(wtState.isResting){
        overlay.innerHTML=`
            <div style="flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;">
                <div style="font-size:1rem;color:var(--text-muted);margin-bottom:8px;">⏱ Rest</div>
                <div class="wt-timer-display" id="wtTimerDisplay">${wtState.restSeconds}</div>
                <div style="font-size:0.8rem;color:var(--text-muted);">Next: ${S_esc(ex)} — Set ${wtState.setNum}</div>
                <button class="btn btn-big" onclick="skipRest()" style="margin-top:20px;width:80%;">Skip Rest ▶</button>
            </div>
            <div class="wt-progress"><div class="wt-progress-fill" style="width:${overallProgress}%"></div></div>`;
        startRestTimer();
    }else{
        overlay.innerHTML=`
            <div style="flex:1;display:flex;flex-direction:column;">
                <div class="wt-progress"><div class="wt-progress-fill" style="width:${overallProgress}%"></div></div>
                <div class="wt-set-indicator">${S_esc(ex)} — Set ${wtState.setNum} of ${wtState.totalSetsPerEx}</div>
                <div class="wt-exercise-name">${S_esc(ex)}</div>
                <div style="display:flex;gap:12px;align-items:center;margin:8px 0;">
                    <div style="flex:1;"><label style="font-size:0.7rem;color:var(--text-muted);">Weight (kg)</label>
                        <input type="number" id="wtWeight" class="wt-big-input" value="${wtState.currentWeight}" min="0" step="0.5" onfocus="this.select()">
                    </div>
                    <div style="flex:1;"><label style="font-size:0.7rem;color:var(--text-muted);">Reps</label>
                        <input type="number" id="wtReps" class="wt-big-input" value="${wtState.currentReps}" min="0" onfocus="this.select()">
                    </div>
                </div>
                <div class="wt-quick-btns">
                    <button class="wt-quick-btn" onclick="adjustWTWeight(2.5)">+2.5 kg</button>
                    <button class="wt-quick-btn" onclick="adjustWTWeight(5)">+5 kg</button>
                    <button class="wt-quick-btn" onclick="adjustWTWeight(-2.5)">-2.5 kg</button>
                    <button class="wt-quick-btn" onclick="adjustWTReps(2)">+2 reps</button>
                </div>
                <div style="display:flex;align-items:center;gap:8px;margin:8px 0;justify-content:center;">
                    <span style="font-size:0.7rem;color:var(--text-muted);">RPE:</span>
                    ${[6,7,8,9,10].map(r=>`<button class="wt-quick-btn ${wtState.currentRPE===r?'tag-active':''}" onclick="setWTRPE(${r})">${r}</button>`).join('')}
                </div>
                <button class="btn btn-big btn-success" onclick="logWTSet()" style="margin-top:12px;">✅ Log Set</button>
                <button class="btn btn-sm btn-outline" onclick="endWalkthrough()" style="margin-top:8px;">✕ Exit Walk-Through</button>
            </div>`;
    }
}
window.adjustWTWeight=function(delta){
    wtState.currentWeight=Math.max(0,(wtState.currentWeight||0)+delta);
    const inp=S('#wtWeight');if(inp)inp.value=wtState.currentWeight;
};
window.adjustWTReps=function(delta){
    wtState.currentReps=Math.max(0,(wtState.currentReps||0)+delta);
    const inp=S('#wtReps');if(inp)inp.value=wtState.currentReps;
};
window.setWTRPE=function(rpe){wtState.currentRPE=rpe;renderWalkthrough();};
window.logWTSet=function(){
    const weight=parseFloat(S('#wtWeight')?.value)||wtState.currentWeight;
    const reps=parseInt(S('#wtReps')?.value)||wtState.currentReps;
    const ex=todayExs[wtState.exIndex];
    const e=getOrCreateTodayEntry();e.sets=e.sets||[];
    e.sets.push({exercise:ex,weight,reps,rpe:wtState.currentRPE});
    wtState.currentWeight=weight;wtState.currentReps=reps;
    wtState.totalSetsDone++;wtState.totalVolume+=weight*reps;
    save('gymReaperLog',log);
    checkPR(ex,weight,reps);
    showCheckAnim();
    // Advance
    wtState.setNum++;
    if(wtState.setNum>wtState.totalSetsPerEx){
        wtState.setNum=1;wtState.exIndex++;
        if(wtState.exIndex>=todayExs.length){
            endWalkthrough();return;
        }
        wtState.currentWeight=getLastWeight(todayExs[wtState.exIndex]);
    }
    wtState.isResting=true;wtState.restSeconds=settings.restTimer||90;
    renderWalkthrough();
};
window.skipRest=function(){
    clearInterval(wtState._restInterval);
    wtState.isResting=false;renderWalkthrough();
};
function startRestTimer(){
    clearInterval(wtState._restInterval);
    wtState._restInterval=setInterval(()=>{
        wtState.restSeconds--;
        const disp=S('#wtTimerDisplay');if(disp)disp.textContent=wtState.restSeconds;
        if(wtState.restSeconds<=0){
            clearInterval(wtState._restInterval);
            wtState.isResting=false;
            if(navigator.vibrate)navigator.vibrate([200,100,200]);
            renderWalkthrough();
        }
    },1000);
}
window.endWalkthrough=function(){
    clearInterval(wtState?._restInterval);
    S('#walkthroughOverlay').classList.remove('active');
    wtState=null;
    if(!todayCompleted){
        const e=getOrCreateTodayEntry();
        if(e.sets&&e.sets.length>0&&confirm('Workout done! Mark as complete?')){
            e.complete=true;save('gymReaperLog',log);
            toast('✅ Workout completed!');celebrate('🏆');
            setTimeout(()=>location.reload(),1500);
        }
    }
    renderWorkout();
};

// ── SET LOGGER (MANUAL) ──────────────────
window.openSetLogger=function(ex,idx){
    editingSetId=ex;
    const modal=S('#modal');
    const lastW=getLastWeight(ex);
    S('#modalContent').innerHTML=`<h3>Log Set — ${S_esc(ex)}</h3>
        <div class="set-row"><label>Weight (kg):</label><input type="number" id="setWeight" value="${lastW}" min="0" step="0.5"></div>
        <div class="set-row"><label>Reps:</label><input type="number" id="setReps" value="10" min="0"></div>
        <div class="set-row"><label>RPE (1-10):</label><input type="number" id="setRPE" value="7" min="1" max="10"></div>
        <div class="wt-quick-btns" style="margin:8px 0;">
            <button class="wt-quick-btn" onclick="adjustModalWeight(2.5)">+2.5</button>
            <button class="wt-quick-btn" onclick="adjustModalWeight(5)">+5</button>
            <button class="wt-quick-btn" onclick="adjustModalWeight(-2.5)">-2.5</button>
        </div>
        <button class="btn" id="saveSetBtn" style="margin-top:10px;">Save Set</button>`;
    modal.classList.add('active');
    window.adjustModalWeight=function(d){
        const inp=S('#setWeight');if(inp)inp.value=Math.max(0,(parseFloat(inp.value)||0)+d);
    };
    S('#saveSetBtn').addEventListener('click',()=>{
        const w=parseFloat(S('#setWeight').value)||0,r=parseInt(S('#setReps').value)||0,rpe=parseInt(S('#setRPE').value)||0;
        const e=getOrCreateTodayEntry();e.sets=e.sets||[];
        e.sets.push({exercise:editingSetId,weight:w,reps:r,rpe:rpe});
        save('gymReaperLog',log);modal.classList.remove('active');
        checkPR(editingSetId,w,r);renderWorkout();toast(`Set logged: ${w}kg × ${r}`);
    });
    modal.addEventListener('click',(ev)=>{if(ev.target===modal)modal.classList.remove('active');});
};
window.deleteSet=function(ex,j){
    const e=log.find(x=>x.date===todayStr);if(!e)return;
    const setsForEx=e.sets.filter(s=>s.exercise===ex);
    if(setsForEx[j]){e.sets=e.sets.filter(s=>s!==setsForEx[j]);save('gymReaperLog',log);renderWorkout();}
};
window.saveNotesAuto=function(v){
    const e=getOrCreateTodayEntry();e.notes=v;save('gymReaperLog',log);
};

// ── REST TIMER ───────────────────────────
const timerFloat=S('#timerFloat');
timerFloat.addEventListener('click',()=>{
    if(timerRunning){clearInterval(timerInterval);timerRunning=false;timerFloat.classList.remove('running');timerFloat.textContent='⏱';return;}
    timerSec=settings.restTimer||90;timerFloat.textContent=timerSec;timerFloat.classList.add('running');timerRunning=true;
    timerInterval=setInterval(()=>{timerSec--;timerFloat.textContent=timerSec;
        if(timerSec<=0){clearInterval(timerInterval);timerRunning=false;timerFloat.classList.remove('running');timerFloat.textContent='⏱';
            if(navigator.vibrate)navigator.vibrate([200,100,200]);toast('⏰ Rest complete!');}
    },1000);
});

// ── HISTORY PAGE ─────────────────────────
function renderHistory(){
    const el=S('#page-history');
    const recent=[...log].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,30);
    let html=`<div class="card"><div class="card-header">📅 Recent Workouts</div>`;
    if(recent.length===0)html+=`<p style="color:var(--text-muted);">No workouts logged yet.</p>`;
    recent.forEach(e=>{
        html+=`<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);">
            <strong>${e.date}</strong> — ${e.day||''} · ${e.complete?'✅':'❌'} · ${(e.sets||[]).length} sets
            ${e.notes?`<br><small style="color:var(--text-muted);">📝 ${S_esc(e.notes).substring(0,60)}</small>`:''}
        </div>`;
    });
    html+=`</div>`;el.innerHTML=html;
}

// ── ANALYTICS PAGE ────────────────────────
function renderAnalytics(){
    const el=S('#page-analytics');
    const freq={};log.filter(e=>e.complete).forEach(e=>{(e.sets||[]).forEach(s=>{freq[s.exercise]=(freq[s.exercise]||0)+1;})});
    const topEx=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5);
    let html=`<div class="card"><div class="card-header">📊 Weekly Volume</div><div class="chart-bar" id="weeklyChart"></div></div>
        <div class="card"><div class="card-header">💪 Top Exercises</div>`;
    topEx.forEach(([n,c])=>html+=`<div style="display:flex;justify-content:space-between;padding:4px 0;">${S_esc(n)}<strong>${c}</strong> sets</div>`);
    html+=`</div><div class="card"><div class="card-header">📏 Body Measurements</div>
        <button class="btn btn-sm" onclick="openMeasureModal()">+ Log Measurement</button>
        <div style="margin-top:8px;font-size:0.75rem;">`;
    const recentMeas=[...measurements].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
    recentMeas.forEach(m=>{html+=`<div style="padding:3px 0;">${m.date}: ${m.weight||'—'}kg | Waist:${m.waist||'—'} | Chest:${m.chest||'—'}</div>`;});
    html+=`</div></div>`;el.innerHTML=html;
    setTimeout(drawWeeklyChart,100);
}
function drawWeeklyChart(){
    const container=S('#weeklyChart');if(!container)return;
    const data=[];for(let w=5;w>=0;w--){const end=new Date(today);end.setDate(today.getDate()-w*7);const start=new Date(end);start.setDate(end.getDate()-6);data.push(log.filter(e=>e.complete&&new Date(e.date)>=start&&new Date(e.date)<=end).length);}
    const max=Math.max(...data,1);
    container.innerHTML=data.map((v,i)=>`<div class="bar" style="height:${(v/max)*100}px;"><span>W${i+1}</span></div>`).join('');
}
window.openMeasureModal=function(){
    const modal=S('#modal');
    S('#modalContent').innerHTML=`<h3>Log Measurement</h3>
        <input type="number" id="mWeight" placeholder="Weight (kg)" step="0.1">
        <input type="number" id="mWaist" placeholder="Waist (cm)" step="0.1">
        <input type="number" id="mChest" placeholder="Chest (cm)" step="0.1">
        <input type="number" id="mArms" placeholder="Arms (cm)" step="0.1">
        <input type="number" id="mThighs" placeholder="Thighs (cm)" step="0.1">
        <button class="btn" id="saveMeasureBtn">Save</button>`;
    modal.classList.add('active');
    S('#saveMeasureBtn').addEventListener('click',()=>{
        measurements.push({date:todayStr,weight:parseFloat(S('#mWeight').value)||0,waist:parseFloat(S('#mWaist').value)||0,chest:parseFloat(S('#mChest').value)||0,arms:parseFloat(S('#mArms').value)||0,thighs:parseFloat(S('#mThighs').value)||0});
        save('gymReaperMeasurements',measurements);modal.classList.remove('active');renderAnalytics();
    });
    modal.addEventListener('click',(ev)=>{if(ev.target===modal)modal.classList.remove('active');});
};

// ── LIBRARY PAGE ─────────────────────────
function renderLibrary(){
    const el=S('#page-library');
    let html=`<div class="card"><div class="card-header">📚 Exercise Library</div>
        <input type="text" id="exSearch" placeholder="Search exercises..." oninput="filterLibrary()" style="margin-bottom:8px;">
        <div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;" id="muscleFilters">
            <span class="tag tag-active" data-muscle="all" onclick="filterLibrary('all')">All</span>
            ${muscleGroups.map(m=>`<span class="tag tag-inactive" data-muscle="${m}" onclick="filterLibrary('${m}')">${m}</span>`).join('')}
        </div>
        <div style="margin-bottom:8px;font-size:0.7rem;color:var(--text-muted);">🕐 Recently Used</div>
        <div id="recentExList" style="margin-bottom:10px;"></div>
        <div id="exList" style="max-height:300px;overflow-y:auto;"></div>
    </div>
    <div class="card"><div class="card-header">🏋️ My Templates</div>
        <div id="templateList"></div>
        <button class="btn btn-sm" onclick="openTemplateModal()" style="margin-top:8px;">+ New Template</button>
    </div>`;
    el.innerHTML=html;
    populateRecentExs();populateExList();populateTemplateList();
}
function populateRecentExs(){
    const freq={};log.forEach(e=>{(e.sets||[]).forEach(s=>{freq[s.exercise]=(freq[s.exercise]||0)+1;})});
    const recent=Object.entries(freq).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const container=S('#recentExList');if(!container)return;
    container.innerHTML=recent.map(([n,c])=>`<span class="tag tag-inactive" style="cursor:pointer;" onclick="addExToToday('${S_esc(n)}')">${S_esc(n)} (${c})</span>`).join('')||'<span style="color:var(--text-muted);">No history yet</span>';
}
function populateExList(filter='all',search=''){
    const s=(S('#exSearch')?.value||'').toLowerCase();
    let exs=allExercises;if(s)exs=exs.filter(e=>e.toLowerCase().includes(s));
    const container=S('#exList');if(!container)return;
    container.innerHTML=exs.map(e=>`<div style="padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03);display:flex;justify-content:space-between;align-items:center;">
        <span>${S_esc(e)}</span><button class="btn btn-sm btn-outline" onclick="addExToToday('${S_esc(e)}')">+ Today</button></div>`).join('')||'<div style="color:var(--text-muted);">No exercises found</div>';
}
window.filterLibrary=function(muscle){
    if(muscle&&muscle!=='all'){SA('.tag[data-muscle]').forEach(t=>{t.classList.remove('tag-active');t.classList.add('tag-inactive');});const active=S(`.tag[data-muscle="${muscle}"]`);if(active){active.classList.add('tag-active');active.classList.remove('tag-inactive');}}
    populateExList(muscle||'all');
};
window.addExToToday=function(ex){toast(`${ex} ready — log sets in Workout tab`);renderWorkout();};
function populateTemplateList(){
    const container=S('#templateList');if(!container)return;
    let html='';
    Object.entries(templates).forEach(([name,exs])=>{
        html+=`<div style="padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03);">
            <strong>${S_esc(name)}</strong> <small style="color:var(--text-muted);">(${exs.length} exs)</small>
            <button class="btn btn-sm btn-outline" onclick="editTemplate('${S_esc(name)}')" style="margin-left:8px;">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteTemplate('${S_esc(name)}')">Del</button></div>`;
    });
    container.innerHTML=html||'<div style="color:var(--text-muted);">No custom templates</div>';
}
window.openTemplateModal=function(name=null){
    const modal=S('#modal');const existing=name?templates[name]||[]:[];
    S('#modalContent').innerHTML=`<h3>${name?'Edit':'New'} Template</h3>
        <input type="text" id="tplName" placeholder="Template name" value="${name||''}">
        <textarea id="tplExs" rows="4" placeholder="Exercises (one per line)">${existing.join('\n')}</textarea>
        <button class="btn" id="saveTplBtn">Save</button>`;
    modal.classList.add('active');
    S('#saveTplBtn').addEventListener('click',()=>{const n=S('#tplName').value.trim();if(!n)return toast('Name required');const exs=S('#tplExs').value.split('\n').map(l=>l.trim()).filter(l=>l);if(name)delete templates[name];templates[n]=exs;save('gymReaperTemplates',templates);modal.classList.remove('active');renderLibrary();toast('Template saved!');});
    modal.addEventListener('click',(ev)=>{if(ev.target===modal)modal.classList.remove('active');});
};
window.editTemplate=function(name){openTemplateModal(name);};
window.deleteTemplate=function(name){if(confirm(`Delete template "${name}"?`)){delete templates[name];save('gymReaperTemplates',templates);renderLibrary();}};

// ── SETTINGS PAGE ────────────────────────
function renderSettings(){
    const el=S('#page-settings');
    el.innerHTML=`<div class="card"><div class="card-header">🎨 Theme</div>
        <button class="btn btn-outline" onclick="toggleTheme()">Switch to ${settings.theme==='dark'?'☀️ Light':'🌙 Dark'} Mode</button>
    </div>
    <div class="card"><div class="card-header">⏱ Rest Timer (seconds)</div>
        <input type="number" id="restTimerInput" value="${settings.restTimer||90}" min="30" max="300" step="15">
        <button class="btn btn-sm" onclick="saveRestTimer()">Save</button>
    </div>
    <div class="card"><div class="card-header">🛡️ Streak Freeze: ${settings.streakFreeze||0}</div>
        <small style="color:var(--text-muted);">Earned via achievements. Auto-used when you miss a day.</small>
    </div>
    <div class="card"><div class="card-header">📦 Backup & Restore</div>
        <button class="btn btn-outline" onclick="exportAll()">📥 Export All Data</button>
        <input type="file" id="importFile" accept=".json" onchange="importAll(this)" style="margin-top:8px;">
    </div>
    <div class="card"><div class="card-header">🗑️ Data Management</div>
        <button class="btn btn-danger" onclick="if(confirm('Delete ALL data?')){localStorage.clear();location.reload();}">💣 Reset All Data</button>
    </div>
    <div class="card"><div class="card-header">🔒 Privacy</div>
        <p style="font-size:0.7rem;color:var(--text-muted);">All data stored locally. Zero tracking. Zero servers.</p>
    </div>`;
}
window.toggleTheme=function(){settings.theme=settings.theme==='dark'?'light':'dark';document.body.classList.toggle('light');save('gymReaperSettings',settings);renderSettings();};
window.saveRestTimer=function(){settings.restTimer=parseInt(S('#restTimerInput').value)||90;save('gymReaperSettings',settings);toast('Rest timer saved!');};
window.exportAll=function(){
    const data={log,bfLog,templates,measurements,settings,exportDate:todayStr,version:3.1};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`gym-reaper-v3.1-${todayStr}.json`;a.click();
    toast('✅ Backup downloaded!');
};
window.importAll=function(input){
    const file=input.files[0];if(!file)return;const reader=new FileReader();
    reader.onload=(e)=>{try{const data=JSON.parse(e.target.result);if(!data.version)throw new Error('Invalid');if(!confirm(`Restore backup from ${data.exportDate}?`))return;if(data.log)save('gymReaperLog',data.log);if(data.bfLog)save('gymReaperBFLog',data.bfLog);if(data.templates)save('gymReaperTemplates',data.templates);if(data.measurements)save('gymReaperMeasurements',data.measurements);if(data.settings)save('gymReaperSettings',data.settings);toast('✅ Restored!');setTimeout(()=>location.reload(),1500);}catch(err){toast('❌ Invalid file');}};
    reader.readAsText(file);
};

// ── INIT ─────────────────────────────────
renderWorkout();
const modal=S('#modal');modal.addEventListener('click',(ev)=>{if(ev.target===modal)modal.classList.remove('active');});
S('#walkthroughOverlay').addEventListener('click',function(ev){if(ev.target===this&&wtState&&!wtState.isResting){if(confirm('Exit walk-through mode?')){endWalkthrough();}}});

const yesterday=new Date(today);yesterday.setDate(yesterday.getDate()-1);
const yestStr=yesterday.toISOString().slice(0,10);
const yestDone=log.find(e=>e.date===yestStr&&e.complete);
if(!yestDone&&currentStreak===0&&settings.streakFreeze>0&&totalWorkouts>0){settings.streakFreeze--;save('gymReaperSettings',settings);toast('🛡️ Streak Freeze used!');}

console.log('💀 GYM REAPER OS v3.1 — Walk-Through Edition Ready');
console.log(`Rank: ${cr.name} | Streak: ${currentStreak} | Workouts: ${totalWorkouts}`);
})();
</script>
