<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0B1220">
    <title>GYM REAPER OS ELITE</title>
    <style>
        :root { --bg:#0B1220; --card:#121C2F; --text:#fff; --workout:#3B82F6; --goal:#22C55E; --analytics:#06B6D4; --radius:16px; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,sans-serif;padding:16px;}
        .dashboard{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
        .card{background:var(--card);border-radius:12px;padding:14px}
        .card-workout-hero{grid-column:1/3}
        .hero-title{font-weight:900;font-size:1.4rem}
        .btn{background:var(--workout);color:#fff;padding:10px;border-radius:10px;border:none;cursor:pointer}
        .weekly-day{display:flex;flex-direction:column;align-items:center;padding:8px;border-radius:10px;background:rgba(255,255,255,0.02)}
        .dot{width:12px;height:12px;border-radius:50%}
        .dot-done{background:#22C55E}.dot-planned{background:var(--workout)}.dot-missed{background:#EF4444}.dot-rest{background:#334155}
        .modal-overlay{position:fixed;left:0;right:0;top:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:all .12s}
        .modal-overlay.active{visibility:visible;opacity:1}
        .modal{background:#0f172a;padding:16px;border-radius:12px;min-width:320px}
        input,select{padding:8px;border-radius:8px;border:1px solid #334155;background:#121C2F;color:#fff}
        .report-overlay{position:fixed;left:0;right:0;top:0;bottom:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;}
        .report-overlay.active{visibility:visible;opacity:1}
        .report-container{background:#081029;padding:16px;border-radius:12px;max-width:900px;width:95%;max-height:85vh;overflow:auto}
    </style>
</head>
<body>
<div class="dashboard" id="dashboard"></div>

<!-- Modals and hidden sections -->
<div class="modal-overlay" id="customModal">
    <div class="modal">
        <h3>Custom Exercise</h3>
        <input id="modalName" placeholder="Exercise name"><br><br>
        <input id="modalSets" placeholder="Sets (e.g. 3)"><br><br>
        <input id="modalReps" placeholder="Reps (e.g. 10)"><br><br>
        <div style="display:flex;gap:8px"><button class="btn" id="modalSaveBtn">Save</button><button class="btn" id="modalCancelBtn" style="background:#334155">Cancel</button></div>
    </div>
</div>

<div class="modal-overlay" id="bodyFatModal">
    <div class="modal">
        <h3>Log Body Fat</h3>
        <label>Body Fat %</label><br>
        <input id="bfInput" type="number" step="0.1"><br><br>
        <label>Weight (kg)</label><br>
        <input id="weightInput" type="number" step="0.1"><br><br>
        <div style="display:flex;gap:8px"><button class="btn" id="bfSaveBtn">Save</button><button class="btn" id="bfCancelBtn" style="background:#334155">Cancel</button></div>
    </div>
</div>

<div class="report-overlay" id="reportOverlay">
    <div class="report-container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h2>📊 Detailed Analytics</h2><button id="closeReportBtn" class="btn" style="background:#334155">Close</button></div>
        <div id="reportTabs" style="display:flex;gap:8px;margin-bottom:12px">
            <button class="report-tab btn" data-tab="monthly">Monthly</button>
            <button class="report-tab btn" data-tab="exercises">Exercises</button>
            <button class="report-tab btn" data-tab="trends">Trends</button>
        </div>
        <div id="reportContent"></div>
    </div>
</div>

<script>
// Simplified, robust single-file app. Fixed variable typos and guarded DOM ops.
(function(){
    const today = new Date(); const todayStr = today.toISOString().slice(0,10);
    const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const todayName = dayNames[today.getDay()];

    const workoutPlan = {
        Monday:{muscle:'Chest + Triceps',exercises:['Bench Press','Incline Dumbbell Press','Cable Flyes','Tricep Pushdown','Skull Crushers','Dips']},
        Tuesday:{muscle:'Back + Biceps',exercises:['Deadlift','Barbell Row','Lat Pulldown','Face Pulls','Barbell Curls','Hammer Curls']},
        Wednesday:{muscle:'Shoulders',exercises:['Overhead Press','Lateral Raises','Front Raises','Rear Delt Fly','Arnold Press','Shrugs']},
        Thursday:{muscle:'Chest + Triceps',exercises:['Bench Press','Incline Dumbbell Press','Cable Flyes','Tricep Pushdown','Skull Crushers','Dips']},
        Friday:{muscle:'Back + Biceps',exercises:['Deadlift','Barbell Row','Lat Pulldown','Face Pulls','Barbell Curls','Hammer Curls']},
        Saturday:{muscle:'Legs',exercises:['Squat','Romanian Deadlift','Leg Press','Leg Curl','Calf Raises','Lunges']},
        Sunday:{muscle:'Rest',exercises:[]}
    };

    const workoutTemplates = Object.fromEntries(Object.entries(workoutPlan).map(([k,v])=>[v.muscle || k, v.exercises]));

    let log = [];
    try{ log = JSON.parse(localStorage.getItem('gymReaperLog')||'[]'); }catch(e){ log = []; }
    let bfLog = [];
    try{ bfLog = JSON.parse(localStorage.getItem('gymReaperBFLog')||'[]'); }catch(e){ bfLog = []; }
    let overrideWorkout = null;
    try{ overrideWorkout = localStorage.getItem('gymReaperOverride') }catch(e){ overrideWorkout = null }

    const saveLog = ()=>{ try{ localStorage.setItem('gymReaperLog', JSON.stringify(log)); }catch(e){} };
    const saveBFLog = ()=>{ try{ localStorage.setItem('gymReaperBFLog', JSON.stringify(bfLog)); }catch(e){} };
    const saveOverride = (v)=>{ overrideWorkout = v; try{ if(v) localStorage.setItem('gymReaperOverride', v); else localStorage.removeItem('gymReaperOverride'); }catch(e){} };

    function getTodayEntry(){ return log.find(e=>e.date===todayStr) || null }
    function getCustomExercises(){ return getTodayEntry()?.customExercises || [] }
    function getTodayExercisesDone(){ return getTodayEntry()?.exercisesCompleted || [] }
    function isTodayCompleted(){ return !!getTodayEntry()?.complete }
    function getTodayWorkoutType(){ if (overrideWorkout && workoutTemplates[overrideWorkout]) return overrideWorkout; return workoutPlan[todayName].muscle }
    function getTodayExercises(){ const type = getTodayWorkoutType(); return workoutTemplates[type] || workoutPlan[todayName].exercises }

    // Metrics
    const totalWorkouts = log.filter(e=>e.complete).length;
    const totalExercisesAll = log.reduce((s,e)=>s + (e.exercisesCompleted?.length || 0), 0);
    const currentStreak = (function(){ let s=0; for(let d=new Date(today); ; d.setDate(d.getDate()-1)){ const ds=d.toISOString().slice(0,10); const entry = log.find(e=>e.date===ds && e.complete); if(entry) s++; else break; if(s>10000) break } return s })();
    const longestStreak = (function(){ const dates = log.filter(e=>e.complete).map(e=>e.date).sort(); let max=0,cur=0,prev=null; for(let d of dates){ const nd=new Date(d); if(prev){ if((nd-prev)/(864e5)===1) cur++; else cur=1 } else cur=1; prev=nd; if(cur>max) max=cur } return max })();
    const weeklyWorkouts = log.filter(e=>e.complete && (new Date(e.date) >= (function(){ const s=new Date(today); s.setDate(s.getDate()-s.getDay()); return s })())).length;
    const monthlyWorkouts = log.filter(e=>e.complete && (new Date(e.date) >= new Date(today.getFullYear(), today.getMonth(), 1))).length;

    // XP and ranks
    let xp = totalWorkouts * 25; if(weeklyWorkouts>=5) xp+=50; if(monthlyWorkouts>=20) xp+=100; if(currentStreak>=7) xp+=35; if(currentStreak>=30) xp+=150;
    const rankTiers = [ {name:'Novice',min:0,icon:'🌱'},{name:'Beginner',min:100,icon:'💪'},{name:'Warrior I',min:300,icon:'⚔️'},{name:'Warrior II',min:600,icon:'🗡️'},{name:'Warrior III',min:1000,icon:'⚡'},{name:'Elite I',min:1500,icon:'🔥'},{name:'Elite II',min:2500,icon:'💥'},{name:'Champion',min:4000,icon:'🏆'},{name:'Legend',min:6000,icon:'👑'},{name:'Reaper',min:10000,icon:'💀'} ];
    let currentRank = rankTiers[0]; for (let r of rankTiers) if (xp >= r.min) currentRank = r; const nextRank = rankTiers[rankTiers.indexOf(currentRank)+1] || null;

    // Achievements (simplified for brevity)
    const achievements = [ {id:'A001',name:'First Blood',req:1,xp:20}, {id:'A002',name:'Getting Started',req:5,xp:25}, {id:'A003',name:'Week Warrior',req:7,xp:35}].map(a=>{ const val = (a.id==='A001'? totalWorkouts : a.id==='A002'? totalWorkouts : currentStreak); return {...a, earned: val>=a.req, progress: Math.min(val,a.req)} });
    const latestAch = achievements.filter(a=>a.earned).pop() || null;
    const nextAch = achievements.find(a=>!a.earned) || null;

    const customExercises = getCustomExercises(); const todayCompleted = isTodayCompleted(); const todayExercisesDone = getTodayExercisesDone(); const todayType = getTodayWorkoutType(); const todayExercises = getTodayExercises(); const totalEx = todayExercises.length + customExercises.length;

    const targetBF = 8.0; const startBF = bfLog.length>0? bfLog[0].bodyFat : 13.2; const latestBF = bfLog.length>0? bfLog[bfLog.length-1].bodyFat : startBF; const goalProgress = Math.min(100, Math.max(0, Math.round((startBF - latestBF) / (startBF - targetBF) * 100)));

    // Render root
    const root = document.getElementById('dashboard');
    root.innerHTML = `
        <div class="card card-rank"><div><strong>${currentRank.name}</strong></div><div>XP: ${xp}</div><div>Next: ${nextRank?.name||'MAX'}</div></div>
        <div class="card card-streak"><div><strong>${currentStreak}</strong></div><div>Longest: ${longestStreak}</div></div>
        <div class="card card-goal"><div><strong>CUT PHASE</strong></div><div style="margin-top:8px"><div style="height:8px;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden"><div style="width:${goalProgress}%;height:100%;background:var(--goal)"></div></div><div style="font-size:0.8rem;margin-top:6px">${goalProgress}%</div></div><button id="logBFBtn" class="btn" style="margin-top:8px;background:var(--goal)">📊 Log Body Fat</button></div>
        <div class="card card-workout-hero">
            <div style="display:flex;justify-content:space-between;align-items:center"><div class="hero-title">${todayName}: ${todayType}</div><div><select id="overrideSelect"><option value="">(none)</option>${Object.keys(workoutTemplates).map(o=>`<option value="${o}">${o}</option>`).join('')}</select><button id="clearOverrideBtn" class="btn" style="background:#334155;margin-left:8px">Clear</button></div></div>
            <div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap"><div style="flex:1"><div style="font-weight:700">📋 Today's Plan</div><div id="planSection"><div id="exerciseList" style="margin-top:8px"></div></div></div><div style="width:260px"><div style="font-weight:700">🔹 Custom Exercises <button id="openModalBtn" class="btn" style="float:right">+</button></div><div id="customSection" style="margin-top:8px"><div id="customExerciseList"></div></div></div></div>
            <div style="margin-top:12px;display:flex;justify-content:space-between;align-items:center"><div id="yt">Yesterday | Tomorrow</div><button id="markBtn" class="btn">✅ Mark Day Complete</button></div>
        </div>
        <div class="card card-achievement"><div><strong>${latestAch?.name||'Locked'}</strong></div><div style="margin-top:8px">Next: ${nextAch?.name||'—'}</div></div>
        <div class="card card-analytics"><div style="display:flex;gap:12px"><div><strong>${totalWorkouts}</strong><div>Workouts</div></div><div><strong>${totalExercisesAll}</strong><div>Exercises</div></div><div><strong>${weeklyWorkouts}</strong><div>This week</div></div></div><div style="margin-top:8px"><button id="openReportBtn" class="btn" style="background:var(--analytics)">📊 Detailed Report</button></div></div>
        <div class="card card-weekly" id="weeklyCard" style="grid-column:1/4;display:flex;gap:8px;overflow:auto;padding:12px"></div>
    `;

    // Override handlers
    const overrideSelect = document.getElementById('overrideSelect'); if (overrideWorkout) overrideSelect.value = overrideWorkout; overrideSelect.addEventListener('change', ()=>{ saveOverride(overrideSelect.value || null); location.reload(); });
    document.getElementById('clearOverrideBtn').addEventListener('click', ()=>{ saveOverride(null); location.reload(); });

    // Weekly planner
    try{
        const weekStart = new Date(today); weekStart.setDate(today.getDate()-((today.getDay()+6)%7));
        const weeklyContainer = document.getElementById('weeklyCard');
        for(let i=0;i<7;i++){ const d = new Date(weekStart); d.setDate(weekStart.getDate()+i); const ds = d.toISOString().slice(0,10); const dayShort=['MON','TUE','WED','THU','FRI','SAT','SUN'][i]; const isToday = ds===todayStr; const isPast = d < today && !isToday; const entry = log.find(e=>e.date===ds); let dotClass='dot-rest', label='Rest'; const planDay = workoutPlan[dayNames[d.getDay()]]; if(entry?.complete){ dotClass='dot-done'; label='Done'; } else if(isPast && planDay.muscle!=='Rest'){ dotClass='dot-missed'; label='Missed' } else if(isToday && todayType!=='Rest'){ dotClass = todayCompleted ? 'dot-done' : 'dot-planned'; label = 'Today' } else if(planDay.muscle!=='Rest'){ dotClass='dot-planned'; label='Planned' }
            const div = document.createElement('div'); div.className='weekly-day'; div.innerHTML = `<div style="font-size:0.7rem">${dayShort}</div><div class="dot ${dotClass}" style="margin:8px 0"></div><div style="font-size:0.7rem;color:#94a3b8">${label}</div>`; weeklyContainer.appendChild(div);
        }
    }catch(e){}

    // Exercise list
    const exerciseListEl = document.getElementById('exerciseList');
    if (todayType !== 'Rest'){
        exerciseListEl.innerHTML = todayExercises.map(ex=>{ const checked = todayExercisesDone.includes(ex); const disabled = todayCompleted ? 'disabled' : ''; return `<div class="ex-row"><input type="checkbox" value="${ex}" ${checked? 'checked' : ''} ${disabled}> ${ex}</div>` }).join('')
    } else exerciseListEl.innerHTML = '<div style="color:#64748b">Active recovery or mobility</div>';

    // Custom exercises
    const customExerciseListEl = document.getElementById('customExerciseList');
    function renderCustomExercises(){ const list = getCustomExercises(); if(list.length>0){ customExerciseListEl.innerHTML = list.map(ce=>{ const checked = getTodayExercisesDone().includes(ce.name); const disabled = isTodayCompleted() ? 'disabled' : ''; return `<div class="ex-row" data-id="${ce.id}"><input type="checkbox" value="${ce.name}" ${checked? 'checked' : ''} ${disabled}> <span style="flex:1">${ce.name} <small style="color:#94a3b8;">${ce.sets}×${ce.reps}</small></span> <button class="edit-btn">✏️</button><button class="delete-btn">🗑️</button></div>` }).join('')
            // attach listeners
            customExerciseListEl.querySelectorAll('.ex-row').forEach(row=>{
                const id = row.dataset.id; row.querySelector('.edit-btn').addEventListener('click', (e)=>{ e.stopPropagation(); const ce = getCustomExercises().find(c=>c.id===id); if(ce) openCustomModal(ce); });
                row.querySelector('.delete-btn').addEventListener('click', (e)=>{ e.stopPropagation(); if(!confirm('Delete?')) return; let entry = log.find(x=>x.date===todayStr); if(entry){ entry.customExercises = (entry.customExercises||[]).filter(c=>c.id!==id); entry.exercisesCompleted = (entry.exercisesCompleted||[]).filter(n=>!n || n!==undefined); saveLog(); renderCustomExercises(); location.reload(); } });
                row.querySelector('input[type="checkbox"]').addEventListener('change', updateRing);
            })
        } else customExerciseListEl.innerHTML = '<div style="color:#94a3b8;font-size:0.8rem">No custom exercises</div>' }
    renderCustomExercises();

    function updateRing(){ const checks = document.querySelectorAll('#exerciseList input[type="checkbox"]:checked, #customExerciseList input[type="checkbox"]:checked'); const pct = totalEx ? Math.round((checks.length/totalEx)*100) : 0; const ringText = pct + '%'; // simple text update
        const ringEl = document.getElementById('ring'); if(ringEl) ringEl.textContent = ringText; const exProgress = document.getElementById('exProgress'); if(exProgress) exProgress.textContent = `${checks.length}/${totalEx}`; const totalExCount = document.getElementById('totalExCount'); if(totalExCount) totalExCount.textContent = totalEx; }
    updateRing();

    const markBtn = document.getElementById('markBtn'); if(markBtn) markBtn.style.display = (totalEx>0 && !todayCompleted) ? 'inline-block' : 'none';

    document.getElementById('planSection')?.addEventListener('click', ()=>{ const list = document.getElementById('exerciseList'); if(list) list.style.display = list.style.display==='none' ? '' : 'none'; });

    const yest = new Date(today); yest.setDate(yest.getDate()-1); const yestName = dayNames[yest.getDay()]; const yestDone = !!log.find(e=>e.date===yest.toISOString().slice(0,10) && e.complete); const tom = new Date(today); tom.setDate(tom.getDate()+1); const tomName = dayNames[tom.getDay()]; document.getElementById('yt').textContent = `Yesterday: ${workoutPlan[yestName].muscle} ${yestDone? '✅':'❌'}  |  Tomorrow: ${workoutPlan[tomName].muscle}`;

    // Modal
    const modal = document.getElementById('customModal'); const modalName = document.getElementById('modalName'); const modalSets = document.getElementById('modalSets'); const modalReps = document.getElementById('modalReps'); const modalSaveBtn = document.getElementById('modalSaveBtn'); const modalCancelBtn = document.getElementById('modalCancelBtn'); let editingId = null;
    function openCustomModal(ex=null){ if(ex){ editingId = ex.id; modalName.value = ex.name; modalSets.value = ex.sets; modalReps.value = ex.reps; } else { editingId = null; modalName.value=''; modalSets.value='3'; modalReps.value='10'; } modal.classList.add('active'); }
    document.getElementById('openModalBtn')?.addEventListener('click', ()=>openCustomModal()); modalCancelBtn?.addEventListener('click', ()=> modal.classList.remove('active')); modal.addEventListener('click', (e)=>{ if(e.target===modal) modal.classList.remove('active'); });
    modalSaveBtn?.addEventListener('click', ()=>{ const name = (modalName.value||'').trim(); if(!name) return alert('Exercise name required'); const sets = parseInt(modalSets.value) || 3; const reps = modalReps.value || '10'; let entry = log.find(e=>e.date===todayStr); if(!entry){ entry = { date:todayStr, day:todayName, exercisesCompleted:[], complete:false, customExercises:[] }; log.push(entry); }
        entry.customExercises = entry.customExercises || [];
        if(editingId){ const idx = entry.customExercises.findIndex(c=>c.id===editingId); if(idx!==-1){ const oldName = entry.customExercises[idx].name; entry.customExercises[idx] = { id:editingId, name, sets, reps }; // update completed names
                entry.exercisesCompleted = (entry.exercisesCompleted || []).map(n=> n===oldName ? name : n ); }
        } else { entry.customExercises.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2), name, sets, reps }); }
        saveLog(); modal.classList.remove('active'); renderCustomExercises(); updateRing(); });

    // Mark complete
    markBtn?.addEventListener('click', ()=>{
        const checked = [...document.querySelectorAll('#exerciseList input[type="checkbox"]:checked, #customExerciseList input[type="checkbox"]:checked')].map(c=>c.value);
        if(checked.length===0) return alert('Select at least one exercise!'); const idx = log.findIndex(e=>e.date===todayStr); if(idx!==-1){ log[idx].exercisesCompleted = checked; log[idx].complete = true; } else log.push({ date:todayStr, day:todayName, exercisesCompleted:checked, complete:true, customExercises: getCustomExercises() }); saveLog(); location.reload();
    });

    // Body fat modal
    const bfModal = document.getElementById('bodyFatModal'); document.getElementById('logBFBtn')?.addEventListener('click', ()=> bfModal.classList.add('active'));
    document.getElementById('bfCancelBtn')?.addEventListener('click', ()=> bfModal.classList.remove('active'));
    document.getElementById('bfSaveBtn')?.addEventListener('click', ()=>{ const bf = parseFloat(document.getElementById('bfInput').value); if(isNaN(bf) || bf<=0) return alert('Valid BF % required'); bfLog.push({ date: todayStr, bodyFat: bf, weight: parseFloat(document.getElementById('weightInput').value)||0 }); saveBFLog(); location.reload(); });

    // Sparklines data (robust)
    const weeklyVolumes = [];
    for(let w=9; w>=0; w--){ const end = new Date(today); end.setDate(today.getDate() - w*7); const start = new Date(end); start.setDate(end.getDate()-6); const cnt = log.filter(e=>e.complete && new Date(e.date) >= start && new Date(e.date) <= end).length; weeklyVolumes.push(cnt); }
    const adherenceData = [];
    for(let m=5;m>=0;m--){ const ref = new Date(today.getFullYear(), today.getMonth()-m, 1); const end = new Date(today.getFullYear(), today.getMonth()-m+1, 0); const days = end.getDate(); const done = log.filter(e=>e.complete && new Date(e.date) >= ref && new Date(e.date) <= end).length; adherenceData.push(Math.round((done / Math.max(1, days))*100)); }

    // Small report
    const reportOverlay = document.getElementById('reportOverlay'); const reportContent = document.getElementById('reportContent'); const reportTabs = document.getElementById('reportTabs'); document.getElementById('openReportBtn')?.addEventListener('click', ()=>{ reportOverlay.classList.add('active'); switchTab('monthly'); }); document.getElementById('closeReportBtn')?.addEventListener('click', ()=> reportOverlay.classList.remove('active'));
    reportTabs.querySelectorAll('.report-tab').forEach(t=> t.addEventListener('click', ()=> switchTab(t.dataset.tab)));
    function switchTab(tab){ reportTabs.querySelectorAll('.report-tab').forEach(t=>t.classList.remove('active')); const active = reportTabs.querySelector(`[data-tab="${tab}"]`); if(active) active.classList.add('active'); generateReportContent(tab); }
    function generateReportContent(tab){ try{ if(tab==='monthly'){ let html = '<h3>Monthly Summary</h3><table style="width:100%"><tr><th>Month</th><th>Workouts</th></tr>'; for(let m=5;m>=0;m--){ const ref = new Date(today.getFullYear(), today.getMonth()-m, 1); const end = new Date(today.getFullYear(), today.getMonth()-m+1, 0); const done = log.filter(e=>e.complete && new Date(e.date)>=ref && new Date(e.date)<=end).length; html += `<tr><td>${ref.toLocaleString(undefined,{month:'short',year:'numeric'})}</td><td>${done}</td></tr>` } html += '</table>'; reportContent.innerHTML = html }
        else if(tab==='exercises'){ const freq = {}; log.filter(e=>e.complete).forEach(e=>{ (e.exercisesCompleted||[]).forEach(ex=> freq[ex]=(freq[ex]||0)+1); }); const rows = Object.entries(freq).sort((a,b)=>b[1]-a[1]).map(([k,v])=>`<tr><td>${k}</td><td>${v}</td></tr>`).join(''); reportContent.innerHTML = `<h3>Exercise Frequency</h3><table style="width:100%"><tr><th>Exercise</th><th>Count</th></tr>${rows}</table>` }
        else if(tab==='trends'){ reportContent.innerHTML = `<h3>Weekly Volumes</h3><div>${weeklyVolumes.join(', ')}</div><h3>Adherence (last 6 months)</h3><div>${adherenceData.join(', ')}</div>` }
    }catch(e){ reportContent.innerHTML = '<p style="color:#EF4444">Error loading report</p>' } }

})();
</script>
</body>
</html>
